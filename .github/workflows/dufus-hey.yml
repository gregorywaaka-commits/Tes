name: Hey Dufus — Receive Request & Ask Questions
# Triggered by any comment starting with "hey dufus".
# Does NOT execute immediately. Posts clarification questions, waits for /proceed.
# The existing ai-request-proceed.yml then writes the design doc prompt.
#
# Syntax:
#   hey dufus [new request text]
#     → Asks clarifying questions; on /proceed, writes design doc prompt
#
#   hey dufus context for #N [extra info]
#   hey dufus add to #N [extra info]
#     → Attaches extra context to existing issue #N (same clarification loop)

on:
  issue_comment:
    types: [created]

jobs:
  hey-dufus:
    # Only fire on issue comments (not PRs) that start with "hey dufus"
    # Cover common phone autocapitalize variants: "Hey dufus", "Hey Dufus", "HEY DUFUS"
    # Owner-only guard: only the repo owner can trigger the pipeline.
    if: |
      github.event.issue != null &&
      github.event.comment.user.login == github.repository_owner &&
      (startsWith(github.event.comment.body, 'hey dufus') ||
       startsWith(github.event.comment.body, 'Hey dufus') ||
       startsWith(github.event.comment.body, 'Hey Dufus') ||
       startsWith(github.event.comment.body, 'HEY DUFUS'))
    runs-on: ubuntu-latest
    # Deduplicate: if the same comment triggers twice (e.g. webhook retry),
    # the second run is cancelled. Different comment IDs are always independent.
    concurrency:
      group: hey-dufus-comment-${{ github.event.comment.id }}
      cancel-in-progress: true
    permissions:
      issues: write
      contents: read

    steps:
      - name: Acknowledge with 👀 reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Parse request and post clarification questions
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const commentBody = comment.body.trim();

            // Strip the "hey dufus" prefix
            const raw = commentBody.replace(/^hey\s+dufus\s*/i, '').trim();

            if (!raw) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## 🤖 Dufus here!\n\nYou called me but didn't include a request. Try:\n\n\`\`\`\nhey dufus [your request in plain English]\nhey dufus status\nhey dufus context for #N [extra info to add]\n\`\`\``
              });
              return;
            }

            // ── hey dufus status ──────────────────────────────────────────────────
            // Special meta-command: reply with a live dashboard of all open Dufus
            // issues without starting a new request / Q&A loop.
            if (/^status$/i.test(raw)) {
              const [waiting, ready, aiOpen] = await Promise.all([
                github.rest.issues.listForRepo({
                  owner: context.repo.owner, repo: context.repo.repo,
                  labels: 'waiting-for-clarification', state: 'open', per_page: 20
                }),
                github.rest.issues.listForRepo({
                  owner: context.repo.owner, repo: context.repo.repo,
                  labels: 'ready-for-vscode', state: 'open', per_page: 20
                }),
                github.rest.issues.listForRepo({
                  owner: context.repo.owner, repo: context.repo.repo,
                  labels: 'ai-request', state: 'open', per_page: 20
                })
              ]);

              const fmt = list => list.data.length === 0
                ? '_none_'
                : list.data.map(i => `- #${i.number} — ${i.title}`).join('\n');

              const replyBody = `## 📊 Dufus Status

### ⏳ Waiting for your answers (${waiting.data.length})
${fmt(waiting)}

### ✅ Prompt delivered — waiting for VS Code (${ready.data.length})
${fmt(ready)}

### 📥 New ai-request (not yet clarified) (${aiOpen.data.length})
${fmt(aiOpen)}

---
*To answer a waiting request: comment on that issue, then say \`/proceed\`.*
*To cancel a request: comment \`/cancel\` on that issue.*`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: replyBody
              });
              return;
            }

            // ── hey dufus help ────────────────────────────────────────────────
            if (/^help$/i.test(raw)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## 🤖 Dufus — Command Reference

### Starting a request
| Command | What it does |
|---------|-------------|
| \`hey dufus [request]\` | Start a new design request — Dufus asks questions, then waits for \`/proceed\` |
| \`hey dufus context for #N [text]\` | Attach extra context to existing issue #N |
| \`hey dufus add to #N [text]\` | Same as above |

### While waiting for clarification
| Command | What it does |
|---------|-------------|
| \`/proceed\` | Write the prompt to VS Code and label \`ready-for-vscode\` |
| \`/proceed skip-questions\` | Skip the Q&A and proceed with Dufus's best guesses |
| \`/proceed implement\` | Skip design doc — implement directly in PDXscript |
| \`/cancel\` | Drop this request, close the issue |
| \`/snooze\` | Pause stale auto-close (use when you're away) |
| \`/unsnooze\` | Resume stale auto-close |
| \`/redo\` | Re-send the latest prompt to VS Code |

### After VS Code finishes
| Command | What it does |
|---------|-------------|
| \`/done\` | Mark issue as implemented, add \`implemented\` label, close |
| \`/cancel\` | Cancel and close as \`wont-do\` |

### Meta
| Command | What it does |
|---------|-------------|
| \`hey dufus status\` | Show dashboard of all open pipeline issues |
| \`hey dufus help\` | Show this help message |

---
*Pipeline docs: see \`OLLAMA_MCP_SETUP.md\` and the \`copilot-instructions.md\` file.*`
              });
              return;
            }

            // Detect "context for #N" variant
            const contextMatch = raw.match(/^(?:context for|add to|for)\s+#?(\d+)\s*(.*)/is);
            let requestText, contextForIssue;

            if (contextMatch) {
              contextForIssue = contextMatch[1];
              requestText = contextMatch[2].trim() || '*(see original comment)*';
            } else {
              contextForIssue = null;
              requestText = raw;
            }

            const extraContextNote = contextForIssue
              ? `\n> 📎 **This is extra context for issue #${contextForIssue}.** I'll attach this to that task when you \`/proceed\`.`
              : '';

            const questionComment = `## 🤖 Dufus received your request — questions before I start

Hey @${comment.user.login}! Got your request. Before I send anything to VS Code, I need to check I've understood you. **Nothing will happen until you say \`/proceed\`.**
${extraContextNote}

---

### 📋 What I heard:

<!-- hey-dufus-request-start -->
${requestText}
<!-- hey-dufus-request-end -->

---

### ❓ Questions — answer briefly, or just say "yes to all":

I've given my best guess for each. You only need to correct what's wrong.

---

**Q1 — Output type: Design doc or direct implementation?**

My guess: **design doc only** (no PDXscript files will be written yet).

> *Why this matters:* The design-doc-first approach means VS Code writes a spec file in \`design_docs/pending/\` which you review and merge into \`WALKING_WAYS_DESIGN.md\`. Only after you approve the design does a separate session write the actual PDXscript. This keeps the mod stable — code never goes in until the logic has been reviewed. If you want to skip this step and jump straight to code (e.g. it's a small fix or you've already designed it in your head), say "implement directly" and VS Code will write PDXscript straight away.
>
> *Answer:* **Design doc** (default) / **Implement directly** / **No, I want: [your answer]**

---

**Q2 — Scope: New feature, tweak to existing design, or fix to live code?**

My guess: **brand-new feature**.

> *Why this matters:* The scope tells VS Code how much of the codebase to read before writing. For a **new feature**, VS Code finds the next available §XX number in \`WALKING_WAYS_DESIGN.md\` and creates a fresh section — it doesn't need to touch any existing files. For a **tweak** (e.g. changing how an existing §XX section is structured or adding edge cases), VS Code reads that section first and writes a diff/amendment. For a **fix** to something already implemented (e.g. a bug in \`mod/events/\` or a broken flag), VS Code reads the live PDXscript file and edits it directly — skipping the design doc step entirely. Getting this wrong wastes a session round-trip, so correct my guess if it's off.
>
> *Answer:* **New feature** / **Tweak to existing §XX** (which section?) / **Fix to live code** (which file/flag?) / **Other: [your answer]**

---

**Q3 — Lore constraints and flag dependencies?**

My guess: **none obvious** — but please check the examples below.

> *Why this matters:* PDXscript events in this mod are gated behind global flags that track the current state of the world — e.g. you can't fire Oblivion Crisis events before \`dagoth_ur_awakened\` is set, or Dragonborn events before a certain year. If you know your feature depends on an existing flag or must NOT fire alongside another system, say so here. Common gates VS Code should know about:
> - \`dagoth_ur_awakened\` — Sixth House / Nerevarine system is active
> - \`kvatch_oblivion_gate_opened\` — Oblivion Crisis has started
> - \`amulet_stolen_in_sewers\` — survival path only (emperor lived)
> - \`tiber_septim_canonical\` — Tiber Septim NPC is the emperor
> - \`heir_hidden_at_priory\` — player emperor has hidden heirs at Weynon Priory
> - Year gates (e.g. "only fire after 3E 389") — important for named NPC spawning (§31.3)
>
> If this feature interacts with any of the above, or has its own prerequisite that isn't obvious, mention it. If unsure, say "check §XX compatibility" and VS Code will read that section first.
>
> *Answer:* **None** / **[flag or section name]**

---

**Q4 — What should VS Code NOT touch?**

My guess: **nothing** — VS Code will only create new files or add to relevant existing ones.

> *Why this matters:* VS Code agents sometimes "helpfully" edit adjacent files they think are related — refactoring an existing event chain to make room for a new one, or touching flags used by a system you're not currently working on. If there are files, flags, or event chains that are off-limits for this session, say so here. Common things people protect:
> - A specific event file that's already implemented and working (\`mod/events/akullakhan_events.txt\`, \`mod/events/oblivion_crisis_events.txt\`, etc.)
> - Global flags that other systems depend on (changing a flag name can silently break gating in a dozen places)
> - The \`WALKING_WAYS_DESIGN.md\` main file (VS Code should only write to \`design_docs/pending/\`, not directly merge into the main design doc — that's your call)
> - The \`CHANGELOG.md\` (you may want to write the changelog entry yourself)
>
> *Answer:* **Nothing** / **[file or flag name(s)]**

---

### 💡 My initial take:

I'll write a **new §XX design doc section** in \`WALKING_WAYS_DESIGN.md\` format, covering: triggers, flags, event chain outline, NPC handling, and player-emperor edge cases. VS Code writes the spec only — no PDXscript yet. You review and merge.

---

### ✅ When you're ready:

Answer the questions above (or just correct what's wrong), then:

\`\`\`
/proceed
\`\`\`

Or skip questions with \`/proceed skip-questions\` — I'll use my guesses above.

**Nothing will happen in VS Code until you say /proceed.**

---

*Labeled \`waiting-for-clarification\`. Dufus is waiting for you.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: questionComment
            });

      - name: Add waiting-for-clarification label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['waiting-for-clarification', 'hey-dufus-pending']
              });
            } catch (e) { /* labels may not exist yet */ }

