name: Dufus — Cancel Request
# Triggered when the owner comments /cancel on a dufus-labelled issue.
# Removes pipeline labels, cleans up any pending prompt file, and closes the issue.

on:
  issue_comment:
    types: [created]

jobs:
  dufus-cancel:
    # Only fire if: issue comment (not PR), comment starts with /cancel,
    # commenter is the repo owner, and the issue has a dufus pipeline label.
    if: |
      github.event.issue != null &&
      github.event.comment.user.login == github.repository_owner &&
      startsWith(github.event.comment.body, '/cancel') &&
      (contains(join(github.event.issue.labels.*.name, ','), 'waiting-for-clarification') ||
       contains(join(github.event.issue.labels.*.name, ','), 'hey-dufus-pending') ||
       contains(join(github.event.issue.labels.*.name, ','), 'ai-request') ||
       contains(join(github.event.issue.labels.*.name, ','), 'ready-for-vscode'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cancel request — clean up labels, prompt file, and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const issueNumber = context.payload.issue.number;
            const issue = context.payload.issue;

            // Remove all dufus pipeline labels
            const labelsToRemove = [
              'waiting-for-clarification',
              'hey-dufus-pending',
              'ai-request',
              'ready-for-vscode',
              'dufus-snoozed'
            ];
            for (const labelName of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: labelName
                });
              } catch (e) { /* label may not exist — ignore */ }
            }

            // Add wont-do label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['wont-do']
              });
            } catch (e) { /* label may not exist yet — safe to ignore */ }

            // Delete any pending prompt file for this issue in incoming/ or done/
            let deletedFiles = [];
            for (const dir of ['.continue/prompts/incoming', '.continue/prompts/done']) {
              if (!fs.existsSync(dir)) continue;
              const files = fs.readdirSync(dir).filter(f =>
                f.startsWith(`issue-${issueNumber}-`) && f.endsWith('.md')
              );
              for (const f of files) {
                const fullPath = path.join(dir, f);
                fs.unlinkSync(fullPath);
                deletedFiles.push(fullPath);
              }
            }

            if (deletedFiles.length > 0) {
              execSync('git config user.name "github-actions[bot]"');
              execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
              execSync('git pull --rebase');
              for (const f of deletedFiles) {
                execSync(`git rm -f "${f}"`);
              }
              execSync(`git commit -m "dufus: cancel issue #${issueNumber} — remove prompt file(s)"`);
              for (let attempt = 1; attempt <= 3; attempt++) {
                try { execSync('git push'); break; }
                catch (e) {
                  if (attempt < 3) execSync('git pull --rebase');
                  else throw e;
                }
              }
            }

            const deletedNote = deletedFiles.length > 0
              ? `\n\nPrompt file(s) removed: ${deletedFiles.map(f => `\`${f}\``).join(', ')}`
              : '';

            // Post cancellation comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## ❌ Request cancelled

This Dufus request has been cancelled by the owner.${deletedNote}

The issue has been labeled \`wont-do\` and will now be closed.

---
*To start a new request, create a new issue or comment \`hey dufus [new request]\` on any open issue.*`
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'not_planned'
            });
