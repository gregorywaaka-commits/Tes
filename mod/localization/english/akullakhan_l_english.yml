 # =====================================================================
 #  AKULAKHAN — THE GOD-BUILDER'S PROJECT
 #  Namespace: akullakhan
 #  §24 — The Second Numidium discovery chain
 # =====================================================================

 # --- Trait ---

 akullakhan_scholar: "Akulakhan Scholar"
 akullakhan_scholar_desc: "This ruler knows what most of Tamriel does not: that Dagoth Ur is not merely a god who seized the Heart of Lorkhan for himself. He is building something — Akulakhan, the Second Numidium, a brass god-construct designed to carry his will across Tamriel with the Heart as its engine. The corprus disease is a harvest. The Sixth House sleepers are building material.\n\nThis knowledge is dangerous. The Tribunal would name it heresy. The Nerevarine would call it essential. The scholar who carries it is sharper for the knowing — and unable to unlearn it."

 # --- Modifier ---

 akullakhan_revelation_modifier: "The Weight of What Lies Beneath"
 akullakhan_revelation_modifier_desc: "This ruler understands Dagoth Ur's true ambition. Akulakhan — the Second Numidium — is being built beneath Red Mountain. The corprus plague is not merely a plague. Every infected soul is slowly drawn toward the construct, feeding its growth. Knowing this changes how one thinks about everything else."

 # --- akullakhan.001: The Walking God ---

 akullakhan.001.t: "The Walking God"
 akullakhan.001.desc: "You have noticed something that does not fit the pattern you expected.\n\nThe corprus disease spreads. You knew that. The Sixth House expands its network of sleepers. You knew that too. But there is a direction to it that should not exist in a simple plague — the infected are being drawn toward Red Mountain as much as they spread from it. Cultist whispers speak of 'the gift being returned.' Sixth House agents report, with reverent vagueness, that 'the Walking God approaches completion.'\n\nA walking god. Not Dagoth Ur himself — he is already a god, fused with the Heart of Lorkhan. Something he is building. Something that will walk.\n\nThe Dwemer built something like that once. You remember the texts."
 akullakhan.001.a: "What is the Sharmat building? I will find out."
 akullakhan.001.b: "I want no part of whatever this is."

 # --- akullakhan.010: The God-Builder's Design ---

 akullakhan.010.t: "The God-Builder's Design"
 akullakhan.010.desc: "The evidence converges.\n\nSixth House records — the kind that circulate only among ash devotees who have been trusted with deeper knowledge — describe something that has been under construction since before Dagoth Ur's awakening became public knowledge. The passages beneath Red Mountain that the Tribunal sealed are not sealed. They are active. The construct is vast: man-formed, enormous, built of consolidated divine essence and bound brass.\n\nYou have read enough Dwemer scholarship to recognize the shape of the ambition. Numidium. The Dwemer's god-machine. The Brass God that Tiber Septim used to conquer Tamriel.\n\nDagoth Ur is not merely a god who has claimed the Heart. He is making a second one — one that will walk, and will not be containable by the Tribunal, the Ghost Fence, or anyone else. The Nerevarine who comes to Red Mountain expecting only Dagoth Ur will be surprised by what else is waiting there."
 akullakhan.010.a: "A god-construct. Powered by the Heart. Akulakhan — the Second Numidium."
 akullakhan.010.b: "I have seen enough. This is beyond what I can act on."

 # --- akullakhan.020: Akulakhan — The Second Numidium ---

 akullakhan.020.t: "Akulakhan — The Second Numidium"
 akullakhan.020.desc: "It has a name.\n\nAkulakhan. That is what Dagoth Ur calls it: the Second Numidium. A brass god-construct built in the deep chambers beneath Red Mountain, powered by the Heart of Lorkhan, intended to carry the Sharmat's will across Tamriel when it is complete. The corprus disease is not spreading randomly — it is a harvest. Every soul infected becomes, in time, a source of divine essence drawn downward, toward the construct's growth. The Sixth House does not merely serve Dagoth Ur. It feeds his god.\n\nThe Nerevarine's task, as the prophecy describes it, is to defeat Dagoth Ur and sever his connection to the Heart. That is necessary. It is not sufficient. Akulakhan exists independently of whether Dagoth Ur lives. If the construct is completed and the Nerevarine does not destroy it — if they reach the Heart without first breaking the brass body — then the Sharmat's dream survives him.\n\nYou are the only person outside the Sixth House who knows this. What you do with it determines everything."
 akullakhan.020.a: "The Nerevarine must know. Dagoth Ur is building a god, not only being one."
 akullakhan.020.b: "I tell no one. I carry this alone."
 akullakhan.020.c: "Dagoth Ur builds something new. I will serve the god-builder's vision."

 # --- akullakhan.021: Warning received by the Nerevarine ---

 akullakhan.021.t: "The Walking God Stirs"
 akullakhan.021.desc: "A messenger reaches you — or a vision arrives in the night, carrying the weight of someone else's discovery — with knowledge that changes the shape of what waits for you at Red Mountain.\n\nDagoth Ur is not only a god who has claimed the Heart of Lorkhan. He is building Akulakhan: the Second Numidium. A brass god-construct of enormous scale, powered by the Heart itself, fed by the harvested essence of thousands of corprus-infected souls. The Sixth House does not merely spread a plague — it feeds a god-machine.\n\nThe prophecy of Azura said to go to Red Mountain, defeat Dagoth Ur, and sever his connection to the Heart. The prophecy did not mention what else is waiting there.\n\nIt does now."
 akullakhan.021.a: "The construct. He is building Numidium again. I must destroy it as well as him."
 akullakhan.021.b: "I had not understood the scale of the Sharmat's ambition. Now I do."

 # --- Custom Tooltips ---

 akullakhan_warn_nerevarine_tt: "You share knowledge of Akulakhan — the Second Numidium — with living Nerevarine-marked rulers. They will understand what waits for them at Red Mountain."
 akullakhan_keep_secret_tt: "You keep the knowledge of Akulakhan to yourself. Whatever the Nerevarine faces at Red Mountain, they will face it without this warning."
 akullakhan_serve_construct_tt: "You pledge to serve the god-building project. The Sixth House's deepest circle now numbers one more among its architects."

 # =====================================================================
 #  §24 DWEMER PATH — Localization
 #  Events akullakhan.020 Option D, akullakhan.030 – .032
 # =====================================================================

 # --- akullakhan.020 Option D ---

 akullakhan.020.d: "Kagrenac built Numidium to deny the gods. Dagoth Ur has built the same thing to serve one. He has done it wrong."

 # --- akullakhan.030: Kagrenac's Purpose, Revisited ---

 akullakhan.030.t: "Kagrenac's Purpose, Revisited"
 akullakhan.030.desc: "You have lived with the knowledge of Akulakhan for months, turning it over.\n\nThe Dwemer spent centuries refining tonal architecture into a science. Kagrenac — their greatest theorist — spent decades designing the Tools and determining how the Heart of Lorkhan could be reached, tapped, and made to do work. He built Numidium as the ultimate expression of that work: a machine that could exceed what the gods represented, demonstrate that divinity was a material property that skilled mortals could replicate and surpass.\n\nNumidium was not a god. It was the argument that gods were unnecessary.\n\nDagoth Ur is using Kagrenac's exact methodology. The Heart as the divine engine. The construct as the body through which that engine acts. He has reproduced the architecture almost exactly. But where Kagrenac's machine was meant to make divinity irrelevant, Dagoth Ur's machine is a vehicle for more divinity — his own, extended through a brass body that will walk Tamriel forever.\n\nKagrenac built a door. Dagoth Ur is walking through it backwards.\n\nThe question is whether the door can be used correctly — or whether the knowledge of how to build it can be recovered from what Dagoth Ur has made."
 akullakhan.030.a: "He walked through it backwards. Kagrenac designed this to deny the gods. Dagoth Ur has used it to become one."
 akullakhan.030.b: "Kagrenac built an engine to make the gods irrelevant. Dagoth Ur has used the same engine to make himself eternal. The application is monstrous."

 # --- akullakhan.031: The Proof of Concept ---

 akullakhan.031.t: "The Proof of Concept"
 akullakhan.031.desc: "The structural analysis of Akulakhan's tonal framework is the most detailed physical record of Kagrenac's methods that has ever existed.\n\nAnd it implies something that almost no living scholar has considered.\n\nThe great question of Dwemer scholarship — why they all vanished simultaneously at the Battle of Red Mountain — has always been answered as catastrophic failure. Kagrenac struck the Heart, something went wrong, and every Dwemer soul was destroyed or scattered. The construct they were building was never finished. The project failed.\n\nThe tonal record embedded in Akulakhan says something different.\n\nThe resonance that Kagrenac induced in the Heart at Red Mountain was precisely calibrated — not the wild, destructive error that a disaster would produce, but a controlled harmonic that pulled every soul attuned to it into alignment. The Dwemer were all attuned to it, through years of tonal practice. The resonance reached them all simultaneously, at the exact frequency Kagrenac had spent his life refining.\n\nThe Dwemer didn't vanish because the project failed. The resonance worked. Every Dwemer soul was drawn into the Heart's frequency simultaneously — distributed, harmonised, incorporated. The construct they were building was never meant to be powered by the Heart from the outside. It was meant to give a distributed people a body to inhabit.\n\nNumidium was not a war machine or a god-substitute. Numidium was a body.\n\nThe Dwemer were going to become it. They didn't fail in time."
 akullakhan.031.a: "The Dwemer didn't fail. They succeeded. Numidium was meant to be their new body — and Kagrenac activated the Heart before it was finished."
 akullakhan.031.b: "I cannot fully accept this. But the tonal record is extraordinary. Something happened at Red Mountain that was not simple destruction."

 # --- akullakhan.032: The Living Blueprint ---

 akullakhan.032.t: "The Living Blueprint"
 akullakhan.032.desc: "You have absorbed what the construct can teach.\n\nAkulakhan is the most detailed working record of Kagrenac's methodology that exists anywhere in Tamriel. The theoretical texts in Dwemer ruins are fragments — partial records, incomplete proofs, notes that assume the reader already knows the fundamentals. Akulakhan is the applied version: the actual architecture of what it looks like when Kagrenac's method is put to work at scale, using the Heart of Lorkhan as its engine.\n\nYou understand things now that no mortal who hadn't stood in the presence of a god-construct could understand. The relationship between the tonal frequency of the Heart and the frequency of the construct's structural harmonics. The way divine essence is conducted through brass rather than bone. The specific resonance nodes that link the Heart's output to the construct's animating principle.\n\nThis is not theoretical. This is a blueprint. And you have read it.\n\nWhat you do next depends on where you already are."
 akullakhan.032.a: "I am already walking the Dwemer's road. This is a map of where it leads — and I am further along it now."
 akullakhan.032.b: "This is the Dwemer's method made visible. I can follow it. I will follow it."
 akullakhan.032.c: "I already draw from the Heart through the Tools. Akulakhan is the Heart drawing through a constructed body. I am the same thing, smaller — and I understand what I am now."
 akullakhan.032.d: "I will document everything and step back. Whoever comes after me will have a better map than I was given."

 # --- Modifier ---

 akullakhan_dwemer_insight_modifier: "Kagrenac's Blueprint"
 akullakhan_dwemer_insight_modifier_desc: "This ruler has decoded the tonal architecture record embedded in Akulakhan's construction — the most detailed surviving record of Kagrenac's actual methodology. What they understand now cannot be found in any Dwemer text. It was only accessible because Dagoth Ur rebuilt what Kagrenac designed, and because this scholar was willing to study it."

 # --- Custom Tooltips (Dwemer path) ---

 akullakhan_dwemer_path_tt: "You approach Akulakhan as a Dwemer scholar: not to serve it, not to stop it, but to understand what it reveals about Kagrenac's actual methodology — and recover what the Dwemer knew."
 akullakhan_blueprint_path_advance_tt: "Studying Akulakhan's gestalt architecture grants direct milestone advancement on the Tonal Architecture path. The construct demonstrates in practice what the theoretical texts only describe."
 akullakhan_blueprint_path_begin_tt: "Decoding Akulakhan's tonal record allows you to begin the Tonal Architecture Walking Way path with two milestones already achieved. The blueprint teaches what years of theoretical study would otherwise require."
 akullakhan_blueprint_heart_scholar_tt: "As a Heart scholar drawing from Lorkhan's Heart through Kagrenac's Tools, you recognise in Akulakhan a mirror of your own method, vastly scaled. The insight is shattering and irreversible."
 akullakhan_blueprint_record_tt: "You document your findings and do not pursue the path further. The record will outlast you. Someone will use it."
