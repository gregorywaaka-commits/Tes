l_english:
 # ═══════════════════════════════════════════════════════════════
 #  THE WALKING WAYS — Mantling Localization
 # ═══════════════════════════════════════════════════════════════

 # ─── Trait Names ───
 mantle_talos: "Aspect of Talos"
 mantle_talos_desc: "This ruler has walked in Talos's footsteps long enough that the footsteps are now theirs. They are not Talos — they ARE the pattern Talos expressed. The mortal god. The man who became divine by becoming the embodiment of human will."
 mantle_arkay: "Walker of the Cycle"
 mantle_arkay_desc: "This ruler has witnessed death, survived it, and grieved without anger. Arkay governs the cycle. The mantler is no longer merely subject to its arbitrary schedule."
 mantle_kynareth: "Sky's Chosen"
 mantle_kynareth_desc: "The wind recognises this ruler. The sky has watched. The sky has approved."
 mantle_azura: "Aspect of Azura"
 mantle_azura_desc: "The distinction between this ruler and the Prince of Dusk and Dawn has blurred. Whether this is mantling or something else entirely, the ruler cannot say. Azura has not clarified."
 mantle_meridia: "Light's Instrument"
 mantle_meridia_desc: "Meridia's pattern has overlapped completely with this ruler's. Purification absolute. Corruption finds no purchase near them."

 # ─── Mantling Talos Events ───
 mantling_talos.intro.t: "The Footstep"
 mantling_talos.intro.desc: "The path is chosen. In a dream — or perhaps in a battle — the White Warrior's voice arrives. Not words. An echo. The ruler stood where Talos stood. They used his tools. They made his choices. The echo says: there is further to go.\n\n[Walk far enough in someone's footsteps. The distinction collapses.]"
 mantling_talos.intro.a: "I will walk the same road."

 mantling_talos.rank1.t: "The Shout and the Wound"
 mantling_talos.rank1.desc: "The Thu'um has been used. The assassination attempt survived. The wounds are not the same as his wounds — they never are. But they are the same shape.\n\nHe was the man who was stabbed and did not fall. He was the man who shouted and the mountains answered. This ruler has done both."
 mantling_talos.rank1.a: "His wounds were like this. Mine are like this."

 mantling_talos.rank2.t: "The Empire Walks Your Steps"
 mantling_talos.rank2.desc: "The rule extends across Imperial soil. Mercy was shown where a conqueror would not have shown it. The Shezarrine's burden was carried or acknowledged. The pattern is not simply similar to Tiber Septim's. It is the same pattern, expressed again, in different features."
 mantling_talos.rank2.a: "He ruled this way too."
 mantling_talos.rank2.b: "I am not him. I do not need to be."

 mantling_talos.rank3.t: "The Pattern Recognises You"
 mantling_talos.rank3.desc: "Something is different now. Courtiers sometimes stop mid-sentence when addressing the ruler, as if they briefly mistook them for someone else — someone not quite present, someone not quite in this era. No one mentions it. It keeps happening.\n\nThe pattern recognises the shape that is accumulating. It has seen this shape before."
 mantling_talos.rank3.a: "Then let it complete itself."

 mantling_talos.apotheosis.t: "The Footsteps Are Now Yours"
 mantling_talos.apotheosis.desc: "The distinction is meaningless now.\n\nNot because the ruler became Talos. Not because Tiber Septim was reborn. Because the pattern that Talos expressed — general, emperor, wound-bearer, mercy-giver, man who held an empire together through force of will and something else — has been expressed again, fully, in this reign.\n\nThe ruler looks in the mirror.\n\nFor a fraction of a second, which is also every second, they see both faces."
 mantling_talos.apotheosis.a: "I look in the mirror and see them."
 mantling_talos.apotheosis.b: "I look in the mirror and see myself."

 # ─── Mantling Arkay Events ───
 mantling_arkay.intro.t: "The Cycle Calls"
 mantling_arkay.intro.desc: "The Monomyth says Arkay may once have been a mortal merchant who died and came back with knowledge that death was not what he had assumed. He became the god of the cycle because he walked through it without understanding and came out understanding. The path is the same. The ruler is alive. They will not be, one day. Between now and then: everything Arkay governs."
 mantling_arkay.intro.a: "I will walk the cycle."

 mantling_arkay.rank1.t: "The Seam"
 mantling_arkay.rank1.desc: "The plague survived. The burial attended. The ruler has looked at death's work — closely, without ceremony — and did not turn away.\n\nThe end is not an absence. It is a seam. The difference is everything."
 mantling_arkay.rank1.a: "The end is not an absence. It is a seam."

 mantling_arkay.rank2.t: "The Season's Turn"
 mantling_arkay.rank2.desc: "Twenty years. The seasons have completed their full revolution more times than the ruler can easily count. They are still here. The throne is still theirs. The cycle has not consumed them.\n\nArkay does not cheat death. He governs it. The mantler, having watched this many cycles, is beginning to understand the difference."
 mantling_arkay.rank2.a: "I have watched the seasons turn."

 mantling_arkay.rank3.t: "The Cycle Names You"
 mantling_arkay.rank3.desc: "The priests of Arkay in the capital have begun leaving things at the ruler's door. Flowers. A small carved bone. A note that says only: 'We see you.'\n\nThis is not a threat. This is recognition."
 mantling_arkay.rank3.a: "I am ready for what comes after the after."

 mantling_arkay.apotheosis.t: "The Cycle Is Complete"
 mantling_arkay.apotheosis.desc: "All deaths return to the cycle. The cycle returns to Arkay. And Arkay — if the Monomyth is right, if the mortal merchant is the god — once walked through death and returned with authority over it.\n\nThe ruler has walked through enough deaths, grieved enough without anger, endured enough seasons, survived enough of what was supposed to end them.\n\nThe cycle is complete. The mantler is now, in some sense the priests are still debating, the cycle."
 mantling_arkay.apotheosis.a: "All deaths return to me. I remember them."

 # ─── Mantling Kynareth Events ───
 mantling_kynareth.intro.t: "The Wind Turns"
 mantling_kynareth.intro.desc: "Not all divine patterns are about power or knowledge. Kynareth's is about openness — the sky that does not hold its breath, the hand that gives without keeping a ledger, the storm that does not apologise for being a storm.\n\nThe ruler chose this path. The wind, for a moment, came from a direction it did not come from before."
 mantling_kynareth.intro.a: "The wind comes before any banner."

 mantling_kynareth.rank1.t: "Word and Wind"
 mantling_kynareth.rank1.desc: "The Word Wall yielded its secret. The open hand gave without cause. Kynareth's patterns are accumulating in this reign."
 mantling_kynareth.rank1.a: "The sky and I have an understanding."

 mantling_kynareth.rank2.t: "Storm's Measure"
 mantling_kynareth.rank2.desc: "The battle outnumbered, survived. The Companions' chain completed. The ruler has proven they can weather what the sky sends — and that the sky has noticed their willingness."
 mantling_kynareth.rank2.a: "I did not ask the storm to be kinder. I asked myself to be equal to it."

 mantling_kynareth.rank3.t: "The Sky Witnesses"
 mantling_kynareth.rank3.desc: "Birds fly in unusual formations near the ruler's keep. The Greybeards sent a message. Kyne — Shor's widow, mother of men — has been watching longer than the ruler has been ruling.\n\nShe is almost satisfied."
 mantling_kynareth.rank3.a: "Then I will give her the rest."

 mantling_kynareth.apotheosis.t: "The Wind Is Yours"
 mantling_kynareth.apotheosis.desc: "The sky opened.\n\nNot metaphorically. The sky opened, briefly, and the ruler felt something that was Kynareth's understanding of everything — the wideness of it, the indifference that is not cruelty but simply scale, the grief of Shor still carried millennia later, the love for men that is older than men's awareness of being loved.\n\nIt closed again. The ruler remained. The wind in the courtyard has not behaved the same way since."
 mantling_kynareth.apotheosis.a: "The wind and I are one kind of thing now."

 mantling_kynareth.openhand.t: "Kynareth Asks an Open Hand"
 mantling_kynareth.openhand.desc: "The path requires a gesture of genuine generosity — not a calculated concession, but a gift with no political architecture. A vassal freed. A burden lifted. The sky is watching for this."
 mantling_kynareth.openhand.a: "Let them go."
 mantling_kynareth.openhand.b: "Not today."

 # ─── Daedric Mantle Events ───
 mantling_daedric.azura_intro.t: "Dusk and Dawn"
 mantling_daedric.azura_intro.desc: "Azura's domain is transformation — the moment between states, the liminal passage. Dusk. Dawn. The edges of things.\n\nMantling a Daedric Prince is different from mantling an Aedra. The Aedra gave themselves to create the world. The Daedra did not. They remain distinct; they are worshipped, not walked alongside.\n\nThe mantler is proceeding anyway. The risk is possession."
 mantling_daedric.azura_intro.a: "I understand the risk. I accept it."

 mantling_daedric.azura_rank1.t: "The First Covenant"
 mantling_daedric.azura_rank1.desc: "The first steps taken. Azura's pattern has been partly expressed. Her stars are in a different position than they were."
 mantling_daedric.azura_rank1.a: "I see the stars differently now."

 mantling_daedric.azura_rank2.t: "The Transformation Witnessed"
 mantling_daedric.azura_rank2.desc: "The transformation is visible. Courtiers note the ruler seems to see things at dusk and dawn that others do not."
 mantling_daedric.azura_rank2.a: "The boundary between states is thinner for me now."

 mantling_daedric.azura_rank3.t: "The Distinction Fades"
 mantling_daedric.azura_rank3.desc: "The distinction between the ruler and the Prince of Dusk and Dawn has blurred significantly. Whether this ends in mantling or possession is now a question of moments."
 mantling_daedric.azura_rank3.a: "The distinction matters less and less."

 mantling_daedric.azura_apotheosis.t: "Aspect or Vessel?"
 mantling_daedric.azura_apotheosis.desc: "The moment arrives. The pattern completes — or it doesn't. Azura does not share her domain willingly.\n\n[Whether this ruler becomes her aspect or her champion is not their choice to make.]"
 mantling_daedric.azura_apotheosis.a: "The distinction is complete. I am her aspect."
 mantling_daedric.azura_apotheosis.uncertain: "Something is happening. I cannot tell what."

 mantling_daedric.azura_possession.t: "Azura's Champion"
 mantling_daedric.azura_possession.desc: "Not mantling. Something adjacent.\n\nThe ruler did not become Azura. They became Azura's champion — which carries power, and carries a patron, and is not what they were seeking.\n\nAzura seems pleased. She often does."
 mantling_daedric.azura_possession.a: "This was not the goal. But it is not nothing."

 mantling_daedric.meridia_intro.t: "Uncompromising Light"
 mantling_daedric.meridia_intro.desc: "Meridia despises the undead with a totality that most divinities reserve for their own worship. Purification is not a preference for her — it is a calling, absolute, without remainder.\n\nThe mantler has carried her Beacon. They have fought the darkness she names. They are beginning to walk in her light's shape."
 mantling_daedric.meridia_intro.a: "I walk in the light."

 mantling_daedric.meridia_rank1.t: "The Darkness Recedes"
 mantling_daedric.meridia_rank1.desc: "Undead in the vicinity of the ruler's court have become... uncomfortable. The necromancers refused their pardons. The pattern is accumulating."
 mantling_daedric.meridia_rank1.a: "The light does not negotiate."

 mantling_daedric.meridia_rank2.t: "The Temple Completed"
 mantling_daedric.meridia_rank2.desc: "The ruler's dedication to Meridia's cause is complete enough to be visible. The light is not metaphor. It is visible."
 mantling_daedric.meridia_rank2.a: "Corruption finds no purchase here."

 mantling_daedric.meridia_rank3.t: "The Light Asks More"
 mantling_daedric.meridia_rank3.desc: "Meridia's pattern is almost complete. The final distinction between the ruler and her uncompromising light is thin."
 mantling_daedric.meridia_rank3.a: "I will give it what it asks."

 mantling_daedric.meridia_apotheosis.t: "Aspect or Instrument?"
 mantling_daedric.meridia_apotheosis.desc: "The purification is complete. Whether this ruler becomes Meridia's aspect or her instrument is not a distinction she has chosen to explain.\n\n[The light is the same either way.]"
 mantling_daedric.meridia_apotheosis.a: "The light and I are one thing."
 mantling_daedric.meridia_apotheosis.uncertain: "The light is very bright. I cannot see the boundary."

 mantling_daedric.meridia_possession.t: "Meridia's Instrument"
 mantling_daedric.meridia_possession.desc: "Not mantling. Something else.\n\nThe ruler did not become Meridia. They became her chosen instrument — which carries light, and carries purpose, and is not what they were seeking.\n\nMeridia, as is her custom, finds this sufficient."
 mantling_daedric.meridia_possession.a: "I am her instrument. The light still burns."

 # ─── Mantling Lorkhan Events ───
 mantle_lorkhan: "The Grey Maybe"
 mantle_lorkhan_desc: "This ruler has walked Lorkhan's path: sacrificed the irreplaceable, been wounded and continued, built something that endures, and remembered why the cost was worth it. They are not Lorkhan — they ARE the principle that Lorkhan expressed: that creation requires giving something up that cannot be recovered."

 mantling_lorkhan.intro.t: "The Doom Drum Calls"
 mantling_lorkhan.intro.desc: "Lorkhan is the god who tricked the Aedra into creating Mundus. He gave up his own divine nature — or convinced others to give up theirs. He was killed for it. His heart fell to Nirn and became a Stone, a Tower, a thing that persisted past his death.\n\nHe is Shor to the Nords. Shezarr to the Cyrodiils. Sep to the Khajiit. He is the god who made the world and paid for it.\n\nThe path ahead requires the same willingness: to sacrifice the irreplaceable for something that will outlast the sacrifice."
 mantling_lorkhan.intro.a: "I accept the cost of creation."

 mantling_lorkhan.rank1.t: "The Sacrifice Acknowledged"
 mantling_lorkhan.rank1.desc: "The ruler has given something up without expecting it back. They have survived a wound that was supposed to end them.\n\nThese are not accidents. Lorkhan's pattern accumulates in the same shape every time: sacrifice, wound, continuation.\n\nThe distinction between making the sacrifice and being the principle of sacrifice is beginning to thin."
 mantling_lorkhan.rank1.a: "The cost was worth it."

 mantling_lorkhan.rank2.t: "The Wound Remembered"
 mantling_lorkhan.rank2.desc: "The Shezarrines are Lorkhan's recurring avatars — mortal champions who carry his wound through each era. They do not escape it. They carry it.\n\nThe ruler is beginning to understand what that means. The creation they have built — the realm, the legacy — exists because of what was given up to build it. The wound is not a failure. The wound is the whole point.\n\nAn echo of something vast and killed and still present stirs in their chest."
 mantling_lorkhan.rank2.a: "The wound is not an ending."

 mantling_lorkhan.rank3.t: "The Heart Speaks"
 mantling_lorkhan.rank3.desc: "Red Mountain is far away. The heart that fell to it is a Stone now — the Red Tower, the heart of Mundus itself, the concentrated remnant of a god who chose creation over divinity.\n\nThe ruler cannot see Red Mountain from where they stand. But they can feel its weight. Not as grief. As recognition.\n\nLorkhan's pattern is almost complete. The heart understands what was built, and why."
 mantling_lorkhan.rank3.a: "I know what it cost. I would pay it again."

 mantling_lorkhan.apotheosis.t: "The Grey Maybe Completes"
 mantling_lorkhan.apotheosis.desc: "Lorkhan is the god who was killed to make the world. That is his pattern: sacrifice, wound, creation, persistence.\n\nThe ruler has expressed all four. The realm exists because of what was sacrificed. The wound was survived. The creation endures. And the ruler persists through it.\n\nThey look at their hands.\n\nSomewhere south and east, a stone pulses with something that is not quite a heartbeat. The ruler's pulse answers it."
 mantling_lorkhan.apotheosis.a: "The world exists because of what was given."
 mantling_lorkhan.apotheosis.b: "The wound was always the point."

 # ─── Mantling Stendarr Events ───
 mantle_stendarr: "Stendarr's Right Hand"
 mantle_stendarr_desc: "This ruler has walked in Stendarr's pattern: mercy shown when cruelty was easier, the weak aided, the Daedra opposed, the vigil maintained. The god of Mercy and Righteous Might once placed his hand on mortal shoulders. The mantler now carries that hand with them."

 mantling_stendarr.intro.t: "Stendarr's Rule"
 mantling_stendarr.intro.desc: "Stendarr is the most present of the Eight Divines. First Era accounts record him standing physically alongside Perrif/Alessia during the Slave Rebellion — not distant, not abstract, but there, placing his hand on mortal shoulders when they needed steadiness.\n\nHe is the God of Mercy and Righteous Might and Charity. The mercy is real. The might is real. Neither is more important than the other.\n\nThe ruler opens their court to that principle."
 mantling_stendarr.intro.a: "I will rule as Stendarr would have me rule."

 mantling_stendarr.rank1.t: "The Open Hand"
 mantling_stendarr.rank1.desc: "Mercy was shown when cruelty was the easier choice. The weak were aided when there was nothing to gain from it. Charity was given without keeping a ledger.\n\nStendarr's first lesson is this: mercy is not weakness. It is harder. Rulers who choose it when they did not have to — that is Stendarr's pattern beginning to accumulate."
 mantling_stendarr.rank1.a: "Mercy was the right choice."

 mantling_stendarr.rank2.t: "Righteous Might"
 mantling_stendarr.rank2.desc: "Stendarr is not only gentle. He has Righteous Might for a reason: the power that is exercised in service of the weak is still power. The Vigilants of Stendarr are his arms — they fight because gentleness without teeth cannot protect anything.\n\nThe ruler has aided the Vigilants. They have opposed what Stendarr opposes: the corruption that mercy alone cannot remedy. The two hands of Stendarr's pattern — open for mercy, closed for righteousness — are both visible in this reign now."
 mantling_stendarr.rank2.a: "Mercy and might are the same hand."

 mantling_stendarr.rank3.t: "The Hand on Shoulders"
 mantling_stendarr.rank3.desc: "There is an old account of Stendarr appearing during Alessia's rebellion — not in glory, not in power, but simply present. Standing with the mortals who needed steadiness. Placing his hand on their shoulders when they were about to fail.\n\nCouriers have started to remark on the ruler's court. Something there is different. The people who come to it afraid leave less afraid. The people who come for judgement feel, somehow, that the judgement is not indifferent.\n\nStendarr placed his hand on mortal shoulders once.\n\nThe mantler's hand has begun to carry the same weight."
 mantling_stendarr.rank3.a: "The hand that steadies is the hand that rules."

 mantling_stendarr.apotheosis.t: "The Righteous Might Is Yours"
 mantling_stendarr.apotheosis.desc: "The mercy. The charity. The vigil against corruption. The aid given to the weak across years and decades without keeping score.\n\nStendarr's pattern has overlapped completely with the ruler's.\n\nNot because the ruler became a god. Because they expressed the same principle — reliably, sustained, without exception — until the distinction between the one who expresses mercy as a divine quality and the one who expresses it as a mortal choice is no longer meaningful.\n\nThere is no crown for this. There is no visible change.\n\nBut the people around the ruler know, the way people always know, that something is different about the hands that govern them."
 mantling_stendarr.apotheosis.a: "I carry his steadiness now."

 # ─── Daedric Mantle Events — Boethiah ───
 mantle_boethiah: "Aspect of Boethiah"
 mantle_boethiah_desc: "The Prince of Plots has been walked alongside long enough that the plots are now this ruler's own. They consumed rivals as Boethiah consumed Trinimac. They seized thrones through treachery and made the treachery permanent. Boethiah's pattern is complete in them — or perhaps they were always the pattern, waiting for the right vessel."

 mantling_daedric.boethiah_intro.t: "Prince of Plots"
 mantling_daedric.boethiah_intro.desc: "Boethiah consumed Trinimac. Not metaphorically — or perhaps entirely metaphorically; no one agrees. What is agreed is that the Altmer warrior-god ceased to be himself and became something lesser, and that the Chimer who followed his consumed remains became the Orsimer.\n\nMantling Boethiah requires the same act: consuming a rival pattern so completely that only Boethiah's shape remains.\n\nThe process is dangerous. Boethiah does not share Attribution's Share with anyone. The mantler risks becoming his champion rather than his aspect.\n\nThe mantler has decided to proceed anyway."
 mantling_daedric.boethiah_intro.a: "I understand what this requires."

 mantling_daedric.boethiah_rank1.t: "The First Consumption"
 mantling_daedric.boethiah_rank1.desc: "The treachery committed. The rival diminished. The throne approached through deception that could not be undone.\n\nBoethiah's pattern begins to accumulate in this reign. Attribution's Share feels slightly less abstract."
 mantling_daedric.boethiah_rank1.a: "The pattern recognises me."

 mantling_daedric.boethiah_rank2.t: "The Web of Plots"
 mantling_daedric.boethiah_rank2.desc: "The ruler now operates in the manner Boethiah prefers: not through force alone, but through the arrangement of forces. Not through obvious power, but through the setting of conditions that make the outcome inevitable.\n\nBoethiah watches. He has not moved to stop them. This is the closest thing to approval he offers."
 mantling_daedric.boethiah_rank2.a: "Attribution's Share is becoming familiar."

 mantling_daedric.boethiah_rank3.t: "The Final Rival"
 mantling_daedric.boethiah_rank3.desc: "The distinction between the ruler and the Prince of Plots is thinner than it has ever been. In court, rivals who have begun to guess the ruler's methods find they cannot out-plot them. The ruler has already seen three moves ahead of the three moves they are seeing.\n\nBoethiah consumed Trinimac entirely. The ruler has consumed enough rivals in this way that they have begun to wonder if they are doing the consuming — or if Boethiah is consuming them."
 mantling_daedric.boethiah_rank3.a: "One more rival left to consume."

 mantling_daedric.boethiah_apotheosis.t: "Attribution's Share or Its Prisoner?"
 mantling_daedric.boethiah_apotheosis.desc: "The moment arrives. The pattern completes — or it doesn't.\n\nBoethiah consumed Trinimac. He did not walk alongside him. He ate him.\n\nThe mantler has spent years walking alongside a Prince who does not walk alongside anyone. One of two things has happened."
 mantling_daedric.boethiah_apotheosis.a: "I consumed the pattern. I was not consumed by it."
 mantling_daedric.boethiah_apotheosis.uncertain: "Something was consumed. I am not certain it was not me."

 mantling_daedric.boethiah_possession.t: "Boethiah's Champion"
 mantling_daedric.boethiah_possession.desc: "Not mantling. Something older.\n\nBoethiah consumed Trinimac. He did not mantle him — he ate him and became something new. The ruler attempted to walk Boethiah's pattern and Boethiah ate them instead.\n\nNot entirely. Not fatally. The ruler still exists. But they are now a champion of the Prince of Plots — which is to say, a piece in a game whose board they can no longer see completely.\n\nBoethiah finds this acceptable."
 mantling_daedric.boethiah_possession.a: "His champion still plots."

 # ─── Daedric Mantle Events — Mephala ───
 mantle_mephala: "The Webspinner's Aspect"
 mantle_mephala_desc: "The web of this ruler's making has grown too large to be distinguished from Mephala's own. They taught themselves to murder in secret. They wove fates. They became the hand behind hands. Whether they mantled Mephala or Mephala finally wove them into the centre of her web is a question the Spiral Skein will not clarify."

 mantling_daedric.mephala_intro.t: "The Webspinner's Invitation"
 mantling_daedric.mephala_intro.desc: "Mephala taught the Chimer to murder in secret. Not from cruelty — because Mundus runs on hidden threads, and the Chimer needed to keep the Aedra from knowing what they were doing until it was too late to undo it.\n\nMephala's domain is the Spiral Skein. Every secret is a thread there. Every murder in the dark. Every puppet whose strings cannot be traced back to the puppeteer.\n\nThe mantler is a weaver. The path ahead requires them to weave until they cannot tell which threads are theirs and which are hers."
 mantling_daedric.mephala_intro.a: "I will learn to weave."

 mantling_daedric.mephala_rank1.t: "The First Threads"
 mantling_daedric.mephala_rank1.desc: "The web is small but real. The first threads have been laid — secrets held, a puppet established, a murder arranged so cleanly that no thread leads back.\n\nMephala has not acknowledged this yet. She doesn't acknowledge anything. But the Spiral Skein has a new corner that did not exist before."
 mantling_daedric.mephala_rank1.a: "The first threads are laid."

 mantling_daedric.mephala_rank2.t: "The Spiral Skein"
 mantling_daedric.mephala_rank2.desc: "The ruler can see it now. Not literally — not always — but in the way one senses the shape of a room through the echoes. The threads run everywhere. Every relationship in court is a thread. Every alliance a knot. Every secret is a thread connected to three others.\n\nMephala's domain is not metaphor. The Spiral Skein is real. The ruler is beginning to perceive its shape."
 mantling_daedric.mephala_rank2.a: "The Spiral Skein is not metaphor. I see it."

 mantling_daedric.mephala_rank3.t: "The Centre of the Web"
 mantling_daedric.mephala_rank3.desc: "The ruler stands at what feels like the centre. Threads run from here to everywhere: to the vassal who does not know they are a puppet, to the secret that has been held for twenty years, to the rival who thinks they are acting independently and is not.\n\nMephala taught the Chimer to murder in secret because the web requires hidden hands. The ruler has become a hidden hand.\n\nThey cannot tell if they are spinning the web or the web is spinning them."
 mantling_daedric.mephala_rank3.a: "I cannot tell if I am spinning the web or the web is spinning me."

 mantling_daedric.mephala_apotheosis.t: "The Webspinner or Her Web?"
 mantling_daedric.mephala_apotheosis.desc: "The Spiral Skein has a centre. At the centre is Mephala.\n\nThe ruler has walked to the centre of their own web — which has grown large enough to overlap with hers. One of two things is true: they have become the Webspinner, as the pattern of walking her steps finally completes. Or they have become a thread in her web — the finest, most central thread, around which everything else is arranged.\n\nBoth outcomes look the same from the outside."
 mantling_daedric.mephala_apotheosis.a: "I am the Webspinner now."
 mantling_daedric.mephala_apotheosis.uncertain: "The web has a centre. I may be it. I cannot see from here."

 mantling_daedric.mephala_possession.t: "Mephala's Thread"
 mantling_daedric.mephala_possession.desc: "Not mantling. Something adjacent and total.\n\nThe ruler attempted to walk to the centre of the Spiral Skein and found that the centre is Mephala — and that they had already been woven into it, tightly, at a point they cannot identify.\n\nThey are a champion of the Webspinner. Which is to say: a thread who believes they are a weaver.\n\nMephala, as is her custom, does not clarify."
 mantling_daedric.mephala_possession.a: "A thread in her web. Nothing more. Nothing less."

 # ─── Daedric Mantle Events — Hircine ───
 mantle_hircine: "The Hunt Incarnate"
 mantle_hircine_desc: "The Huntsman Prince walks in this ruler now. The chase above the kill. The clean death as the highest honour. The respect for prey that fights back. Whether they mantled Hircine or became the principle he embodies is a distinction only the Hunting Grounds could clarify — and the Hunt does not pause to explain itself."

 mantling_daedric.hircine_intro.t: "The Hunt Begins"
 mantling_daedric.hircine_intro.desc: "Hircine is the Huntsman Prince. The souls of werewolves, werebears, and all lycanthropes pass to his Hunting Grounds instead of wherever mortals are otherwise supposed to go. He comes to Nirn periodically — the Bloodmoon — to hunt mortals himself, as both sport and as something else: an honouring of the thing that makes the chase sacred.\n\nHis code is simple: the chase above the kill. Respect for prey that fights back. The clean death is the highest honour. Cowardly prey is contemptible.\n\nMantling Hircine requires becoming the principle behind that code — not merely following it, but being it.\n\nThe risk: the Hunt does not stop for mantlers."
 mantling_daedric.hircine_intro.a: "I will walk in the Hunt's steps."

 mantling_daedric.hircine_rank1.t: "The Chase"
 mantling_daedric.hircine_rank1.desc: "The first milestones have been completed. Great hunts undertaken. Dangerous prey pursued and brought down with honour.\n\nHircine does not acknowledge mantlers. He acknowledges the quality of the chase. Something in the Hunting Grounds has taken note."
 mantling_daedric.hircine_rank1.a: "The chase is its own reward."

 mantling_daedric.hircine_rank2.t: "Prey That Fights Back"
 mantling_daedric.hircine_rank2.desc: "Hircine respects prey that fights back. This is not a metaphor for political opponents — though it applies to those as well. It is a literal principle: the chase is only sacred when the prey could, in theory, escape or kill the hunter.\n\nThe ruler has faced prey that nearly succeeded. They survived. Hircine's pattern runs deep enough now that the distinction between hunting and being hunted, between predator and apex, is becoming fluid."
 mantling_daedric.hircine_rank2.a: "I understand what he honours now."

 mantling_daedric.hircine_rank3.t: "Hunter and Hunted"
 mantling_daedric.hircine_rank3.desc: "The lycanthropes in the ruler's court are restless tonight. This happens sometimes near people who carry Hircine's pattern strongly.\n\nThe ruler stands at the edge of it: almost the Hunt itself. Hunter and hunted collapsed into a single principle. The Hunting Grounds, wherever they are, feel close.\n\nHircine has not come in person yet. But the Bloodmoon is early this year."
 mantling_daedric.hircine_rank3.a: "I am the hunter and the hunted both."

 mantling_daedric.hircine_apotheosis.t: "The Apex or the Prey?"
 mantling_daedric.hircine_apotheosis.desc: "The moment arrives. The Hunt is at its height.\n\nHircine comes to Nirn to hunt. The mantler has spent years learning to become the principle of the Hunt. One of two things is happening now: the Hunt has recognised the mantler as its expression — or Hircine has come to hunt them personally, which is, by his own code, the highest honour he can offer.\n\nBoth feel the same, at the edge of the Bloodmoon."
 mantling_daedric.hircine_apotheosis.a: "I am the Hunt. Not its prey."
 mantling_daedric.hircine_apotheosis.uncertain: "I cannot tell if I am hunting or being hunted."

 mantling_daedric.hircine_possession.t: "Hircine's Quarry"
 mantling_daedric.hircine_possession.desc: "Not mantling. Something Hircine considers a higher honour.\n\nHircine came to hunt the mantler. They were the finest prey he had encountered in an age. He honoured them by not taking them to the Hunting Grounds — not yet. He made them his champion instead.\n\nWhich means: still hunted. But now also hunting. In Hircine's name, which is the name of the Hunt itself.\n\nHircine, as is his custom, respects prey that fights back."
 mantling_daedric.hircine_possession.a: "A beast in his Hunting Grounds. Still alive."

 # ─── Mantling Dibella ───
 mantle_dibella: "Dibella's Grace"
 mantle_dibella_desc: "The distinction between this ruler and the principle of beauty has blurred. Not beauty as vanity — beauty as a force that moves the world. Art commissioned, love given freely, the vessel inhabited completely. Dibella's pattern now walks in them."

 mantling_dibella.intro.t: "The Beautiful Path"
 mantling_dibella.intro.desc: "Dibella's domain is not vanity. It is the principle that beauty is a force in the world — that the erotic, the aesthetic, and the creative are not decorations on power but a kind of power itself.\n\nThe path requires a ruler who has made beauty a principle of rule: patronage, love as policy, the open hand. Not sentiment. Architecture.\n\nThe distinction between expressing Dibella's pattern and becoming it is the path."
 mantling_dibella.intro.a: "I will walk the principle of beauty."

 mantling_dibella.rank1.t: "The First Offering"
 mantling_dibella.rank1.desc: "The arts have been patronised. Love has been expressed as policy — generosity without calculation, beauty created without expectation of return. Dibella's pattern is accumulating in this reign.\n\nIt does not feel like a religious act. It feels like understanding something about how the world is structured that was previously hidden."
 mantling_dibella.rank1.a: "Beauty is not ornament. It is load-bearing."

 mantling_dibella.rank2.t: "The Patron's Hand"
 mantling_dibella.rank2.desc: "The Bards' College has taken notice. Temples of Dibella have sent quiet acknowledgements. The ruler's court has begun to attract artists, lovers, and makers who cannot fully explain why they came.\n\nDibella's pattern is not simply about producing beautiful things. It is about being the condition under which beauty becomes possible. The ruler is becoming that condition."
 mantling_dibella.rank2.a: "The condition, not merely the work."

 mantling_dibella.rank3.t: "The Vessel Nearly Full"
 mantling_dibella.rank3.desc: "Something has shifted in how the ruler moves through the world. People find themselves choosing their words more carefully in the ruler's presence — not from fear, but from a desire not to introduce ugliness near something that has begun to carry beauty's pattern.\n\nDibella's principle is close. The distinction between the ruler's aesthetic sensibility and Dibella's own is becoming difficult to locate."
 mantling_dibella.rank3.a: "The vessel is ready."

 mantling_dibella.apotheosis.t: "The Beauty Is Complete"
 mantling_dibella.apotheosis.desc: "Not a transformation. A completion.\n\nThe ruler was always carrying beauty's pattern — in the patronage, in the generosity, in the love given without a ledger. Dibella's principle was not imposed on them. It was recognised in them.\n\nThe distinction is meaningful now only to scholars. The ruler's presence carries something that changes the quality of light in rooms they enter. Temples of Dibella across Tamriel have begun updating their liturgical texts."
 mantling_dibella.apotheosis.a: "The beauty was already here. I was simply completing it."
 mantling_dibella.apotheosis.b: "I look in the mirror. I see both of us."

 # ─── Mantling Mara ───
 mantle_mara: "Mara's Covenant"
 mantle_mara_desc: "This ruler has become the principle of love that outlasts loss — the covenant kept past grief, the family bond sustained through everything that tries to break it. Mara's pattern walks in them now. The distinction between their love and hers is a question priests of Mara are no longer comfortable answering."

 mantling_mara.intro.t: "The Covenant Calls"
 mantling_mara.intro.desc: "Mara's domain is not romantic love. It is love as covenant — the bond that holds when passion has cooled, that sustains the family through the year of plague, that rebuilds after the war.\n\nShe is patron of marriage, of family, of healers who stay when others leave. Her temples are sanctuaries. Her priests keep records of the bonds they witness.\n\nTo mantle Mara is to become the principle that love is not a feeling. It is a choice, made again every morning, after grief, after loss, after the season that tried to end it."
 mantling_mara.intro.a: "I will walk the covenant."

 mantling_mara.rank1.t: "The Family Bond"
 mantling_mara.rank1.desc: "Children cared for. The sick tended. The family sustained through what tried to break it. Mara's pattern is not dramatic — it is sustained, daily, unchosen-feeling even when chosen.\n\nThe ruler is learning to make love into policy without extracting the love from it. Mara's priests have noticed."
 mantling_mara.rank1.a: "The bond holds. That is the whole point."

 mantling_mara.rank2.t: "The Healer's Hand"
 mantling_mara.rank2.desc: "The pilgrimage undertaken. The sick healed without keeping a ledger of who deserved it. The devotion sustained past the moment when it would have been easier to stop.\n\nMara's pattern is about love that persists in the absence of immediate reward. The ruler has demonstrated they understand this. The covenant is deepening."
 mantling_mara.rank2.a: "The covenant does not expire."

 mantling_mara.rank3.t: "The Hearth Still Burns"
 mantling_mara.rank3.desc: "There is a quality in the ruler's court now that is difficult to name. Disputes resolve more gently. Children who grew up there report a persistent sense of safety they cannot locate in a specific memory.\n\nMara's priests in the capital have been asked by Mara's priests elsewhere whether the ruler is being considered for something. The answer, apparently, is yes."
 mantling_mara.rank3.a: "Tell them the hearth is still burning."

 mantling_mara.apotheosis.t: "Love That Outlasts Loss"
 mantling_mara.apotheosis.desc: "The loss came — it always comes. Death, grief, the season that tried to end everything. And the ruler made the choice again: the covenant holds.\n\nNot because it was easy. Not because the world rewarded it. Because Mara's pattern is precisely that — the love that is not contingent on the world being good. The covenant kept when there was no reason to keep it except that it was made.\n\nThe distinction between this ruler's love and Mara's is a theological question now. The priests are arguing about it. Mara has not clarified."
 mantling_mara.apotheosis.a: "The covenant holds. It always held."
 mantling_mara.apotheosis.b: "I am the love that outlasts loss. That was Mara's pattern all along."

 # ─── Mantling Sheogorath ───
 mantle_sheogorath: "The New Prince of Madness"
 mantle_sheogorath_desc: "The Hero of Kvatch mantled Sheogorath in 3E 433. This ruler has walked the same footsteps — into the Shivering Isles, through the Greymarch, past Jyggalag's final order — and come out the other side. Madness is not the absence of reason. It is a reason creation has not yet caught up to. The distinction between this ruler and the Prince of Madness is now a question of nomenclature."

 mantling_sheogorath.intro.t: "The Mad Path"
 mantling_sheogorath.intro.desc: "Sheogorath was Jyggalag. Prince of Perfect Order, whose domain was logic absolute — until the other Daedric Princes, threatened by Order's encroachment on their domains, cursed him to become his opposite.\n\nEvery era he remembers himself, the Greymarch comes, and Jyggalag destroys the Shivering Isles he built. Then he forgets again and becomes Sheogorath once more.\n\nThe Hero of Kvatch ended this cycle by defeating Jyggalag and taking his place. They mantled the Prince of Madness by becoming the new one.\n\nMadness is not arbitrary. It is a reason the rest of creation cannot yet follow. The risk is that the Grey March catches the mantler before the mantle completes."
 mantling_sheogorath.intro.a: "I will walk the path between Order and Madness."

 mantling_sheogorath.rank1.t: "The First Unreason"
 mantling_sheogorath.rank1.desc: "Something unreasonable has been done. Not cruel — unreasonable. A gift of enormous value to someone who could not possibly repay it. A decision that made no strategic sense but made a different kind of sense that the court could not articulate.\n\nSheogorath's pattern is not about chaos. It is about the creativity that lives inside the refusal to follow expected logic. The court is disturbed. The ruler finds this funny."
 mantling_sheogorath.rank1.a: "Madness is not what they think it is."
 mantling_sheogorath.rank1.b: "Would anyone like some cheese?"

 mantling_sheogorath.rank2.t: "The Shivering Realm"
 mantling_sheogorath.rank2.desc: "The Shivering Isles have two sides — Mania and Dementia — representing the two aspects of madness that Sheogorath embodies. The ruler is beginning to understand this structure: not chaos, but a different order, one that resolves differently.\n\nThe Greymarch is coming. It always comes. The question is whether the mantler will be able to stand in its path the way the Hero of Kvatch did."
 mantling_sheogorath.rank2.a: "Mania and Dementia. The two aspects of what I am becoming."
 mantling_sheogorath.rank2.b: "The Greymarch will not find me unprepared."

 mantling_sheogorath.rank3.t: "The Grey March Approaches"
 mantling_sheogorath.rank3.desc: "Order is coming. Jyggalag's pattern — the Pattern the curse tried to erase — is reasserting itself. The Greymarch.\n\nThe Hero of Kvatch survived it by defeating Jyggalag in single combat and thus freeing him. The mantler is at the same threshold.\n\nThe risk is real: the Grey March does not pause for mantlers. If the pattern collapses before it completes, what remains is not the Prince of Madness. What remains is someone the Grey March caught."
 mantling_sheogorath.rank3.a: "The Greymarch cannot claim what it already made."

 mantling_sheogorath.apotheosis.t: "The New Prince"
 mantling_sheogorath.apotheosis.desc: "The Greymarch came.\n\nAnd stopped.\n\nNot because it was defeated — because the mantler stood in the path of Perfect Order and was found to be its equal-and-opposite: not chaos, but the madness that is a reason Order cannot follow. Jyggalag's pattern was not destroyed. It was completed — by its own opposite finally mantling the curse fully.\n\nThe ruler is the new Prince of Madness. Not Sheogorath precisely — they are still themselves. But the pattern of the Mad Prince walks in them now, indistinguishable from their own.\n\nSheogorath finds this hilarious. The cheese has been found."
 mantling_sheogorath.apotheosis.a: "The cheese has been found. The realm is mine."
 mantling_sheogorath.apotheosis.b: "I am the new Prince. I am also still myself. These are not contradictory."

 mantling_sheogorath.possession.t: "What the Grey March Made"
 mantling_sheogorath.possession.desc: "Not mantling. The other outcome.\n\nThe Greymarch came and the mantler was not sufficient to stand in its path. Not because they were weak — because they were not yet the full Prince, and the full Prince is what the March requires.\n\nWhat remains is not Sheogorath. What remains is not entirely the ruler they were. What remains is someone the Greymarch passed through, left standing, and moved on from — which is, by Sheogorath's peculiar standards, still more than most mortals achieve.\n\nThey are not mad. They are adjacent to madness. In a direction that has no name."
 mantling_sheogorath.possession.a: "Not Sheogorath. Not myself. Something in between."
