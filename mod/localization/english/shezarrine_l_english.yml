l_english:

 # =====================================================================
 #  MODIFIERS
 # =====================================================================

 pelinal_fury: "Pelinal's Fury"
 pelinal_fury_desc: "The White Warrior's berserker wrath has been unleashed. Prowess surges beyond mortal limits. The price is stress and self. The rage will spend itself."

 # =====================================================================
 #  SHEZARRINE — TRAITS
 # =====================================================================

 shezarrine_vessel: "Shezarrine Vessel"
 shezarrine_vessel_desc: "This character has been chosen as a vessel for the spirit of Shor — the divine essence that the Nords call the dead god and the Imperials call the Shezarrine principle. Pelinal Whitestrake was one such vessel. This character is another. The divine martial fury of mankind's champion floods their veins, brings superhuman prowess, and makes sleep a distant memory. The rage is always there, under the surface, waiting."

 pelinal_rage: "Pelinal's Rage"
 pelinal_rage_desc: "The berserker fury of Pelinal Whitestrake lives in this character's flesh. It is not ordinary battle-anger — it is a divine engine of destruction that strips away strategy, caution, and mercy, and leaves only the white fire of killing. While it lasts, this character is almost unstoppable. While it lasts, they are also almost uncontrollable."

 elf_hate: "Elf-Hater's Creed"
 elf_hate_desc: "The hatred of elves that Pelinal Whitestrake carried was not a political opinion — it was a spiritual inheritance from Shor himself, who warred against the et'Ada that would become the Aldmeri pantheon before Mundus was even made. This character carries that same inheritance. Their relationship with any elven ruler is coloured from the first meeting by something older than memory and harder than stone."

 # =====================================================================
 #  SHEZARRINE — EVENTS
 # =====================================================================

 shezarrine.000.a: "The marking passes unnoticed."

 shezarrine.001.t: "The White Warrior Speaks"
 shezarrine.001.desc: "The dream came without warning.\n\nA figure stood in the void — armoured in shining white plate that gave off its own light, sword in hand, visored helm turned toward you as if you were the only thing in all of creation worth looking at. The figure's voice did not come from a mouth. It came from everywhere.\n\n#italic 'I have walked in many skins. Each one broke before the work was done. You are not like the others. You are built for this.'\n\n#italic 'Will you carry what I carried?'\n\nYou stood in the dream and understood, in the way one only understands in dreams, exactly what was being offered — and exactly what it would cost."
 shezarrine.001.a: "I accept. The mantle is mine."
 shezarrine.001.b: "I refuse this burden. My life is my own."

 shezarrine.002.t: "Berserker's Rage"
 shezarrine.002.desc: "It started as battle-focus — the narrowing of attention that comes when steel is drawn and everything else falls away. Then it became something else.\n\nThe rage moved through your body like a tide, and you felt Pelinal Whitestrake's fury — centuries of it, compressed into a single heartbeat — begin to take over your hands."
 shezarrine.002.a: "Surrender to it. Let the White Warrior fight."
 shezarrine.002.b: "Fight it. Stay yourself. Hold the line of your own mind."
 shezarrine.002.a.tooltip: "The rage increases your combat effectiveness but the internal cost is severe."
 shezarrine.002.b.tooltip: "Resisting the rage costs prowess but preserves your sense of self."

 shezarrine.003.t: "The Elf-Hater's Vision"
 shezarrine.003.desc: "The visions came while you were awake — which is worse.\n\nAyleid slave-towers. Nedic men and women in cages built from pale elven stone. Children who had never known a world without a white-eyed master watching from above. And through those cages, a white fire moving — Pelinal Whitestrake, burning, burning, burning everything that the Ayleids had built.\n\nWhen the vision cleared, you found yourself standing in your own hall with your fists clenched and no memory of having moved."
 shezarrine.003.a: "These visions are a reminder of what mankind once endured."
 shezarrine.003.b: "I will not let ancient hatred govern me."

 shezarrine.004.t: "Reman's Echo"
 shezarrine.004.desc: "Standing in the old Imperial provinces — or reading their histories — something resonates at a frequency below ordinary thought.\n\nReman Cyrodiil. Another Shezarrine. Another mortal who carried Shor's fire and built an empire on it. The Second Empire grew from the same root as Pelinal's crusade. The same divine fury wore different faces across different centuries, but it was always the same essence.\n\nYou are part of a chain that began before recorded history and has not yet ended."
 shezarrine.004.a: "I will claim what Reman built and carry it forward."
 shezarrine.004.b: "Reman's chain ends with me. I forge a new legacy."

 # ═══════════════════════════════════════════════════════════════
 #  PATH J — SHEZARRINE ASCENDANT
 # ═══════════════════════════════════════════════════════════════

 # ─── Trait ───
 shezarrine_ascendant: "Shezarrine Ascendant"
 shezarrine_ascendant_desc: "The merger is complete. Lorkhan's pattern and this mortal's identity have converged into something that is neither the dead god nor the mortal ruler but a third thing that partakes of both. The White Warrior's final form. The martial capacity is beyond what any training could produce. The presence is divine-adjacent. Nord and Cyrodilic courts recognise the pattern and are awed by it. The cost was the ordinary self. The result was something greater."

 # ─── Entry Event ───
 shezarrine.ascending_call.a: "The call deepens."

 # ─── Path Intro ───
 shezarrine.100.t: "Lorkhan Deepens"
 shezarrine.100.desc: "The vessel was always going to become more than a vessel. That is what vessels are for.\n\nPelinal Whitestrake was a vessel until the elf-mages tore him apart, and even then his purpose was complete. Reman Cyrodiil was a vessel until the Tsaesci blade found him in his own throne room. The vessels are used and the pattern is served and the dead god is satisfied.\n\nYou are not yet satisfied. The divine essence that has been burning in your blood since the dream in which the White Warrior spoke — it is not content to remain a loan. It is seeking to become a merger. It is asking, in the way that gods ask, which is more command than request, whether you are willing to stop being the vessel and start being the thing carried.\n\nThere is only one answer Lorkhan accepts."
 shezarrine.100.a: "I was already his. Now he is becoming mine."

 # ─── Milestone Events ───
 shezarrine.101.t: "Pelinal's Memory"
 shezarrine.101.desc: "The memory arrived without warning, as memories that are not yours tend to do.\n\nPelinal Whitestrake, standing before an Ayleid tower that he was about to reduce to rubble, the white fire already gathering in his hands. The elves inside the tower knew what was coming. He could hear them through the stone — hear their fear, hear their prayers to gods who would not reach them in time. He felt nothing. Not cruelty. Just certainty.\n\nThe certainty is in your hands now. It has always been there. You are only now recognising it for what it is."
 shezarrine.101.a: "His hatred was not his own. It was Lorkhan's. Now it is mine."
 shezarrine.101.b: "I accept the memory but I will not be consumed by it."

 shezarrine.102.t: "The Enemy's Capital"
 shezarrine.102.desc: "The army stood in the ruins of the capital. The cultural enemy that had defined itself in opposition to mankind's heritage — the towers, the administrations, the court that had been the heart of that opposition — was gone.\n\nThe pattern was satisfied. Pelinal had done this in every lifetime the Shezarrine walked. Reman had done it with different enemies and a different sword. Tiber Septim had done it with an empire and a voice that shook mountains.\n\nYou have done it with what you had. Lorkhan's pattern does not require a particular method. It requires the act."
 shezarrine.102.a: "The capital fell. The pattern is satisfied."

 shezarrine.103.t: "Shor's Vessel Stirs"
 shezarrine.103.desc: "The courts have begun to notice that something about you is not entirely ordinary.\n\nNot the martial reputation — that has always been there. Not the proclamations. Something quieter. The way a room changes when you enter it. The way a battle changes when you arrive at the field. A war-leader, a seneschal, three jarls, and a Cyrodilic bishop have all independently used the same phrase: 'a touch of the divine.'\n\nThey are not wrong. Lorkhan's pattern is becoming visible in your presence."
 shezarrine.103.a: "They call me Shor's vessel. Let them. It is not wrong."

 shezarrine.104.t: "The Proclamation"
 shezarrine.104.desc: "The court convened — a gathering of Nord and Cyrodilic lords, jarls, and churchmen — and made the proclamation that has been building for years.\n\nShor's vessel. Shezarr's sword. The White Warrior walking again.\n\nThe words are older than most of the buildings in the room. The Nords have used them for rulers before — Ysmir, who wore Tiber Septim's face and Lorkhan's fire simultaneously. The pattern is recognised. You have been given the oldest name in their tradition.\n\nLorkhan's essence stirs in response. It was always going to be recognised."
 shezarrine.104.a: "They crowned me with words older than crowns."

 shezarrine.105.t: "The Merger Begins"
 shezarrine.105.desc: "There was a moment — during a battle, or during a council meeting, or lying awake in the dark — when you could no longer fully locate the boundary between where the Shezarrine essence ended and where you began.\n\nNot loss of self. Not possession. Convergence. Two things becoming one thing that is not reducible to either of its components. The dead god's pattern and your pattern have been running in parallel so long that they have started to overlap.\n\nThe merger is happening. It may not be possible to stop it. The question is whether you want to."
 shezarrine.105.a: "I can feel the boundary thinning. I do not want it to stop."
 shezarrine.105.b: "I will not lose myself in this. I am the vessel. Not the god."

 shezarrine.106.t: "The Pattern Takes Shape"
 shezarrine.106.desc: "Pelinal fought to the end. Every Shezarrine has fought to the end.\n\nThe pattern requires it. Not because Lorkhan is cruel — though the dead god is not, in any recognisable sense, kind — but because the pattern was always a sacrifice. Shor/Lorkhan gave himself to create the world. The vessels give themselves to serve the world that was created. The giving does not always mean death. It always means completion.\n\nYou are closer to completion than you have ever been. The fighting is not over."
 shezarrine.106.a: "Pelinal fought to the end. So will I."

 shezarrine.107.t: "The Merger Complete"
 shezarrine.107.desc: "There is no more boundary. There has not been a boundary for some time. You only noticed its absence just now.\n\nYou are still you. The memories are still yours, the choices still your choices, the court still your court. But Lorkhan's pattern is not a thing you carry anymore — it is a thing you are. The divine fire and the mortal will have resolved into a single operating principle.\n\nPelinal described this, in the fragments of his speech that survived: 'I am Shor's voice and I am my own sword.' He was not speaking metaphorically.\n\nNeither are you."
 shezarrine.107.a: "We are one. I do not know where he ends and I begin. I am not certain it matters."

 shezarrine.109.t: "The Final Battle Awaits"
 shezarrine.109.desc: "Every Shezarrine has a final battle. Pelinal's was against Umaril the Unfeathered in the White-Gold Tower. Reman's was against the Tsaesci in his own throne room. Tiber Septim built an empire large enough that his final battle was with the concept of time itself.\n\nYours is coming. The pattern has identified it. The convergence of the merger and the completion of the mythic arc requires one final act — one final expression of Lorkhan's fire in the world that fire created.\n\nYou are ready. You have always been ready. That was the point."
 shezarrine.109.a: "The pattern demands a final act. I go to meet it."

 # ─── Apotheosis ───
 shezarrine.112.t: "The Pattern Completes"
 shezarrine.112.desc: "The final battle is not always a battle. Sometimes it is a siege. Sometimes it is a negotiation that ends in the only way a Shezarrine's negotiations can end. Sometimes it is standing at the top of a tower and understanding, completely, what you are.\n\nLorkhan's pattern, expressed through every vessel he has ever worn, has been leading to this moment since before Mundus was made. The fire, the fury, the divine hatred that is not hatred but is the closest mortal language can come to describing what a god-aspect feels when it operates in the world — all of it has been building toward one final completion.\n\nWhether you survive the completion is part of the pattern. Pelinal didn't. Reman didn't. Tiber Septim, arguably, did not survive intact.\n\nThe pattern requires the act, not the survival. Survival is between you and fate."
 shezarrine.112.a: "The pattern is complete. I remain. Lorkhan's fire is mine."
 shezarrine.112.b: "The final battle comes. I go to meet it."

 # ─── Death Events ───
 shezarrine.115.t: "The White Warrior Returns"
 shezarrine.115.desc: "The pattern is complete."

 shezarrine.115.world.t: "The White Warrior Has Returned"
 shezarrine.115.world.desc: "Word has come from [scope:source.primary_title.name]: [scope:source.char_name|U] is dead.\n\nNord poets and Cyrodilic chroniclers will argue for generations about the precise nature of what was accomplished. The dead god's pattern was expressed, completely, in a mortal vessel. The vessel served its purpose. The fire has returned to Lorkhan.\n\nThe pattern is complete."
 shezarrine.115.world.a: "The pattern is complete. The dead god is satisfied."
