l_english:

 # ===================== Invasion Start =====================
 daedric_invasion.000.t: "The Veil Tears"
 daedric_invasion.000.desc: "Tremors shake the earth and the sky turns crimson. Oblivion itself bleeds into Mundus — a Daedric Prince has chosen this age to unleash their armies upon the mortal realm."

 daedric_invasion.001.t: "Darkness Descends"
 daedric_invasion.001.desc_dagon: "Mehrunes Dagon, Prince of Destruction and Change, has opened the Gates of Oblivion. His Daedric armies pour into the mortal world to raze every kingdom that stands before them."
 daedric_invasion.001.desc_molag: "Molag Bal, the King of Corruption and Prince of Domination, seeks to drag Nirn into Coldharbour. His soul husks and vampiric forces march upon the living."
 daedric_invasion.001.desc_boethiah: "Boethiah, Prince of Plots and Assassination, has seeded treachery across the courts of Tamriel. Her cultists and Daedric warriors advance from the shadows."
 daedric_invasion.001.desc_hircine: "Hircine, the Huntsman of the Princes, has opened his Hunting Grounds to Nirn. Werewolves, werebears, and Daedric hunters stalk every forest and vale."
 daedric_invasion.001.desc_namira: "Namira, the Lady of Decay, spreads corruption across the land. Her children — the ancient and repulsive — crawl forth to devour civilization."
 daedric_invasion.001.desc_generic: "A Daedric Prince has opened the Gates of Oblivion. The mortal world trembles."
 daedric_invasion.001.a: "We must stand against this threat!"
 daedric_invasion.001.b: "Perhaps we can negotiate..."

 # ===================== War Declaration =====================
 daedric_invasion.002.t: "War Declared from Oblivion"
 daedric_invasion.002.desc: "The Daedric armies march openly now, the Prince's herald proclaiming dominion over all mortal lands. There can be no peace until one side is broken."
 daedric_invasion.002.a: "Prepare for war!"

 # ===================== Escalation =====================
 daedric_invasion.005.t: "The Gates Multiply"
 daedric_invasion.005.desc: "New Oblivion Gates crack open across the land. The Daedric forces swell in number; the invasion has entered a deadlier phase."
 daedric_invasion.005.a: "The situation grows dire."

 # ===================== Invasion Ends =====================
 daedric_invasion.020.t: "The Gates are Sealed"
 daedric_invasion.020.desc: "The last Oblivion Gate collapses in on itself. The Daedric Prince, denied a foothold in Mundus, retreats to their realm. Tamriel — battered but unbroken — draws breath once more."
 daedric_invasion.020.a: "Tamriel is safe — for now."

 # ===================== Rally Decision =====================
 daedric_invasion.030.t: "A Call to Arms Against Oblivion"
 daedric_invasion.030.desc: "[scope:liege.GetFirstName] calls upon every loyal vassal to take up arms against the Daedric invaders. The realm must stand united or fall divided."
 daedric_invasion.030.a: "We answer the call!"
 daedric_invasion.030.b: "We have our own problems..."

 # ===================== Submission =====================
 daedric_invasion.040.t: "Kneeling Before Oblivion"
 daedric_invasion.040.desc: "[ROOT.GetFirstName] has bent the knee before the Daedric Prince, pledging mortal service in exchange for protection. Word spreads swiftly — and with it, contempt."
 daedric_invasion.040.a: "So be it."

 # ===================== Banishment Attempt =====================
 daedric_invasion.045.t: "A Champion Steps Forward"
 daedric_invasion.045.desc: "[ROOT.GetFirstName] draws [ROOT.GetPossessivePronoun] blade and marches upon the Daedric Prince. Only one will walk away from this confrontation."
 daedric_invasion.045.a: "Press the advantage — banish this Prince!"
 daedric_invasion.045.b: "Fall back — the Prince is too powerful."

 # ===================== Decisions =====================
 rally_against_daedric_invasion: "Rally Against the Daedric Invasion"
 rally_against_daedric_invasion_desc: "Call upon your vassals and allies to stand together against the Daedric invaders. A united front is our best hope of repelling the forces of Oblivion."
 rally_against_daedric_invasion_effect_tt: "Sends a rally event to all direct vassals."

 submit_to_daedric_prince: "Submit to the Daedric Prince"
 submit_to_daedric_prince_desc: "Surrender your realm's independence to the Daedric Prince, in the hope that submission buys your survival."

 attempt_to_banish_daedric_prince: "Attempt to Banish the Daedric Prince"
 attempt_to_banish_daedric_prince_desc: "Steel yourself and face the Prince directly. If you succeed, the invasion ends. If you fail, the consequences will be severe."

 # ===================== Oblivion Gate Events =====================
 oblivion_gate.001.t: "An Oblivion Gate Opens!"
 oblivion_gate.001.desc: "A crack in reality tears open in one of your counties. A swirling portal to Oblivion stands before you, bleeding Daedra into the mortal world."
 oblivion_gate.001.a: "Muster troops to contain it!"
 oblivion_gate.001.b: "We cannot afford soldiers — defend the walls."

 oblivion_gate.003.t: "Closing the Gate"
 oblivion_gate.003.desc: "The Oblivion Gate roars before you, a cascade of fire and shadow. To close it, someone must enter and destroy the Sigil Stone at its heart."
 oblivion_gate.003.a: "Enter the Gate and destroy it from within!"
 oblivion_gate.003.b: "We could not close it — fall back."

 oblivion_gate.010.t: "The Gate is Sealed!"
 oblivion_gate.010.desc: "The Sigil Stone shatters and the Gate implodes, taking a torrent of Daedra with it. The land is scarred, but the portal to Oblivion is closed."
 oblivion_gate.010.a: "Tamriel stands a little safer."

 # ===================== Traits =====================
 daedric_prince: "Daedric Prince"
 daedric_prince_desc: "A being of immense power from the realm of Oblivion. Immortal and relentless, they cannot be permanently slain — only banished."

 mehrunes_dagon_aspect: "Aspect of Mehrunes Dagon"
 mehrunes_dagon_aspect_desc: "Channelling the Prince of Destruction, this entity embodies change through violence."

 molag_bal_aspect: "Aspect of Molag Bal"
 molag_bal_aspect_desc: "Infused with the will of the King of Corruption, this entity breaks others to serve."

 boethiah_aspect: "Aspect of Boethiah"
 boethiah_aspect_desc: "Shaped by the Prince of Plots, this entity achieves dominance through cunning."

 hircine_aspect: "Aspect of Hircine"
 hircine_aspect_desc: "Driven by the Huntsman's spirit, this entity is an apex predator given purpose."

 namira_aspect: "Aspect of Namira"
 namira_aspect_desc: "Wrapped in ancient darkness, this entity spreads rot and despair."

 oblivion_touched: "Oblivion-Touched"
 oblivion_touched_desc: "Prolonged exposure to open Oblivion Gates has left a mark on this ruler's spirit."

 oblivion_slayer: "Oblivion Slayer"
 oblivion_slayer_desc: "This warrior has personally closed an Oblivion Gate, earning both honour and a hardened soul."

 daedric_vassal: "Daedric Vassal"
 daedric_vassal_desc: "This ruler has bent the knee before a Daedric Prince, trading honour for survival."

 daedric_champion: "Daedric Champion"
 daedric_champion_desc: "Chosen by fate (or stubbornness), this champion has faced a Daedric Prince and prevailed."

 # ===================== CB =====================
 daedric_invasion_cb_victory_prince_desc: "The Daedric forces overwhelm the defenders. Another realm falls under the shadow of Oblivion."
 daedric_invasion_cb_defeat_prince_desc: "The mortal realm holds firm, turning back the tide of Daedra. The Prince retreats — but only for now."
 daedric_invasion_cb_white_peace_desc: "A temporary cessation of hostilities. Neither side has achieved its goals."

 # ===================== Tooltip =====================
 daedric_invasion_started_tt: "A Daedric Invasion is now underway. Oblivion Gates will open across the realm."
 submit_to_daedric_prince_effect_tt: "You become a Daedric Vassal, receiving protection at the cost of prestige and piety."

 # =====================================================================
 #  MODIFIERS — Daedric Invasion
 # =====================================================================

 # General invasion modifiers
 rallied_against_daedra: "Rallied Against Daedra"
 rallied_against_daedra_desc: "This ruler has answered the call to arms against the Daedric invaders."
 rejected_daedric_bargain: "Rejected Daedric Bargain"
 rejected_daedric_bargain_desc: "A Daedric Prince offered a bargain and was refused. The Prince will remember this insult."
 oblivion_gate_province_modifier: "Oblivion Gate Nearby"
 oblivion_gate_province_modifier_desc: "An Oblivion Gate has opened near this county. Daedra pour through, disrupting trade and terrifying the populace."
 oblivion_gate_unchecked: "Oblivion Gate Spreading"
 oblivion_gate_unchecked_desc: "An unchecked Oblivion Gate is allowing more and more Daedra into this county."
 oblivion_gate_daedra_surge: "Daedra Surge"
 oblivion_gate_daedra_surge_desc: "A surge of Daedric power is flowing through the Gate, making the surrounding area extremely dangerous."
 molag_planemeld_dread: "Planemeld Dread"
 molag_planemeld_dread_desc: "Molag Bal's Planemeld is underway. The boundaries between Nirn and Coldharbour are weakening."

 # Per-Prince invasion modifiers
 boethiah_court_conspiracy: "Boethiah's Court Conspiracy"
 boethiah_court_conspiracy_desc: "The Prince of Plots has turned the court against itself. Treachery lurks behind every smile."
 mephala_web_modifier: "Mephala's Web"
 mephala_web_modifier_desc: "The Spider Prince's invisible web has been woven around this ruler. Nothing is as it seems."
 mephala_web_gift: "Mephala's Web: Gift"
 mephala_web_gift_desc: "Mephala has chosen to reward this ruler — for now. Her gifts always come with hidden threads."
 mephala_web_curse: "Mephala's Web: Curse"
 mephala_web_curse_desc: "The Spider's curse has been woven into this ruler's fate. Every relationship is tainted."
 vaermina_nightmare_modifier: "Vaermina's Nightmare"
 vaermina_nightmare_modifier_desc: "Vaermina, the Dreamweaver, has sent nightmares that blur the line between sleep and waking."
 nocturnal_shadow_tithe: "Nocturnal's Shadow Tithe"
 nocturnal_shadow_tithe_desc: "This ruler owes a debt to Nocturnal, the Lady of Shadows. The tithe must be paid."
 nocturnal_shadow_favor: "Nocturnal's Shadow Favour"
 nocturnal_shadow_favor_desc: "Nocturnal has granted this ruler the gift of shadow — secrets come easily, rivals stumble in the dark."
 malacath_oath_curse: "Malacath's Oath Curse"
 malacath_oath_curse_desc: "Malacath has cursed this oath-breaker. Until the broken promise is honoured or atonement is made, nothing prospers."
 namira_rot_modifier: "Namira's Rot"
 namira_rot_modifier_desc: "The Prince of Ancient Darkness has marked this land. Decay spreads from within."
 peryite_plague_modifier: "Peryite's Affliction"
 peryite_plague_modifier_desc: "The Taskmaster's plague has been visited upon this county, testing its people."
 peryite_afflicted_ruler: "Peryite's Afflicted"
 peryite_afflicted_ruler_desc: "This ruler has been personally afflicted by Peryite's pestilence."
 jyggalag_crystal_modifier: "Jyggalag's Crystallisation"
 jyggalag_crystal_modifier_desc: "The Prince of Order is crystallising everything into cold, perfect stasis."
 anti_jyggalag_resistance: "Resistance to Order"
 anti_jyggalag_resistance_desc: "This ruler has found the strength to resist Jyggalag's crystallising influence."
 vile_curse_modifier: "Clavicus Vile's Curse"
 vile_curse_modifier_desc: "Clavicus Vile has cursed this ruler for reneging on a bargain. The terms were never what they seemed."
 meridia_displeasure: "Meridia's Displeasure"
 meridia_displeasure_desc: "The Lady of Infinite Energies has turned her radiant gaze away from this ruler."
 meridia_purge_target: "Meridia's Purge Target"
 meridia_purge_target_desc: "Meridia's light marks this ruler as an enemy of the living. Her champions will seek them out."

 # Daedric artifact holder modifiers
 mehrunes_razor_holder: "Mehrunes' Razor"
 mehrunes_razor_holder_desc: "Bearer of Mehrunes' Razor — the Daedric artefact of pure, swift destruction."
 azura_star_holder: "Azura's Star"
 azura_star_holder_desc: "Keeper of Azura's Star — the unbreakable soul gem of the Daedric Prince of Dawn and Dusk."
 mace_of_molag_bal_holder: "Mace of Molag Bal"
 mace_of_molag_bal_holder_desc: "Wielder of the Mace of Molag Bal — the instrument of domination and corruption."
 ring_of_hircine_holder: "Ring of Hircine"
 ring_of_hircine_holder_desc: "Bearer of the Ring of Hircine — a gift and a curse from the Huntsman Prince."
 saviors_hide_holder: "Saviour's Hide"
 saviors_hide_holder_desc: "Wearer of the Saviour's Hide — Hircine's trophy, fashioned from a werewolf's skin."
 ebony_mail_holder: "Ebony Mail"
 ebony_mail_holder_desc: "Wearer of the Ebony Mail — Boethiah's artefact of concealed destruction."
 ebony_blade_holder: "Ebony Blade"
 ebony_blade_holder_desc: "Wielder of the Ebony Blade — Mephala's parasite-sword, which grows stronger by betrayal."
 masque_of_clavicus_vile: "Masque of Clavicus Vile"
 masque_of_clavicus_vile_desc: "Wearer of the Masque of Clavicus Vile — a perfect face that charms all who see it."
 skull_of_corruption_modifier: "Skull of Corruption"
 skull_of_corruption_modifier_desc: "Bearer of the Skull of Corruption — Vaermina's staff of stolen dreams and nightmares."
 wabbajack_modifier: "Wabbajack"
 wabbajack_modifier_desc: "Holder of the Wabbajack — Sheogorath's absurd staff of random transformation."
 spellbreaker_modifier: "Spellbreaker"
 spellbreaker_modifier_desc: "Bearer of Spellbreaker — Peryite's ancient Dwemer shield of magical suppression."
 sanguine_rose_holder: "Sanguine Rose"
 sanguine_rose_holder_desc: "Bearer of the Sanguine Rose — Sanguine's staff that summons Daedra from Oblivion."
 dawnbreaker_modifier: "Dawnbreaker"
 dawnbreaker_modifier_desc: "Wielder of Dawnbreaker — Meridia's blade of holy fire that destroys the undead."
 volendrung_bearer: "Volendrung"
 volendrung_bearer_desc: "Bearer of Volendrung — Malacath's warhammer, the Cursed Tribe's eternal weapon."
 skeleton_key_holder: "Skeleton Key"
 skeleton_key_holder_desc: "Bearer of the Skeleton Key — Nocturnal's lockpick that opens any door, physical or metaphorical."
 oghma_infinium_holder: "Oghma Infinium"
 oghma_infinium_holder_desc: "Reader of the Oghma Infinium — Hermaeus Mora's tome of forbidden knowledge."
 ring_of_namira_holder: "Ring of Namira"
 ring_of_namira_holder_desc: "Wearer of the Ring of Namira — a gift of the ancient darkness that feeds on the living."
 sword_of_jyggalag_modifier: "Sword of Jyggalag"
 sword_of_jyggalag_modifier_desc: "Wielder of the Sword of Jyggalag — the blade of absolute, crystalline order."
 daedric_quest_cooldown: "Daedric Quest Cooldown"
 daedric_quest_cooldown_desc: "The Daedric Princes' attention is elsewhere for now — they will not approach this ruler again so soon."
