# Encoding: UTF-8-BOM
# =============================================================
#  Lore Races — English Localization
#  File: mod/localization/english/lore_races_l_english.yml
#
#  CRITICAL (Mac + all platforms):
#  This file MUST begin with a UTF-8 BOM (0xEF 0xBB 0xBF).
#  CK3 silently ignores YAML without BOM on all platforms.
#
#  LORE CHOICES & RATIONALE:
#  ──────────────────────────
#  — Echmer: from the Uutak Mythos (Michael Kirkbride-adjacent
#    extended lore); not in base TES games but widely accepted
#    in the modding/fan-lore community.
#  — Maormer: canonical; extensively documented in Pocket Guide
#    to the Empire, ESO, and various in-game books.
#  — Sload Plague date: 1E 2200 (plague begins); 1E 2260 (Thras
#    sunk by All-Flags Navy).  Previous files erroneously had
#    1E 2260 as the plague date — corrected.
#  — Dir-Kamal was KILLED at the Battle of Vivec (2E 572), not
#    merely driven back.  The battle was won by the Ebonheart
#    Pact coalition (Dunmer + Nords + Argonians) and the Tribunal.
#    Vivec did not act alone.  Events kamal.010 and kamal.020
#    represent the two narrative paths (Tribunal intervention vs.
#    player-led coalition victory).
#  — Coral Tower / Coldharbour: the connection is a mod
#    interpretation; marked with an in-file note.
#  — Imga / Marukh: canonical; Marukh was an Imga prophet whose
#    visions sparked the Alessian Order (TES books).
#  — Kothringi: canonical; extinct by 2E 560–580 from Knahaten Flu.
#
#  HOW TO REPLICATE INTO A NEW MOD:
#  ──────────────────────────────────
#  1. Copy this file (with BOM) and the companion files:
#       lore_races_traits.txt, lore_races_effects.txt,
#       lore_races_triggers.txt, lore_races_modifiers.txt,
#       lore_races_decisions.txt, lore_races_on_actions.txt.
#  2. Each race is independently self-contained — you can strip
#     out races you do not want by removing their trait/effect/
#     trigger/event blocks and the corresponding localization keys.
#  3. Echmer depends on title:k_yneslea (EK2 title).
#     Maormer depends on title:k_pyandonea and global King Orgnum.
#     Sload depends on title:c_thras.
#     Kamal invasion triggers at current_date >= 2E.572.
#     Verify EK2 title IDs before use.
# =============================================================
l_english:

 # =====================================================================
 #  ECHMER  (Bat-Mer of Yneslea / Uutak Mythos)
 # =====================================================================
 send_yneslea_expedition: "Send an Expedition to Yneslea"
 send_yneslea_expedition_desc: "Rumours speak of a distant archipelago east of Tamriel, home to a people called the Echmer — bat-like beings of great intelligence, uplifted from common bats by the Dwemer's tonal architecture. An expedition might open trade, learning, and unimaginable arcane possibilities."

 study_echolalia_fantasia: "Study Echolalia Fantasia"
 study_echolalia_fantasia_desc: "An Echmer scholar at court offers to teach you the fundamentals of Echolalia Fantasia — the Echmer's unique sound-based magical discipline, inherited from their Dwemer creators' tonal architecture."

 echmer.000.t: "Whispers from the East"
 echmer.000.desc: "Sailors returning from the Padomaic Ocean speak of a fog-shrouded archipelago where bat-winged people build spires of sound. They call it Yneslea. The Echmer who dwell there are said to be reclusive, brilliant, and deeply suspicious of outsiders — yet hungry for knowledge of the wider world."
 echmer.000.a: "Send ships east — find this Yneslea!"
 echmer.000.b: "An interesting rumour, nothing more."

 echmer.001.t: "An Echmer Envoy Arrives"
 echmer.001.desc: "A slight, fur-covered figure with enormous bat-ears and split-upturned nose stands in your throne room. The Echmer envoy bows — a strangely precise, academic bow — and presents a scroll in a language of humming tones. Your translators scramble."
 echmer.001.a: "Welcome — tell me of Yneslea."
 echmer.001.b: "A bat-person? Curious indeed..."

 echmer.002.t: "The Dwemer's Living Legacy"
 echmer.002.desc: "The Echmer envoy reveals a truth hidden in Yneslea's oldest annals: the Echmer are not a natural race. Long ago, the Noraken clan of Dwemer used tonal architecture — sound-as-creation — to uplift bats into sapient beings, granting them black souls, humanoid bodies, and the gift of Echolalia Fantasia. They are, in a sense, the Dwemer's most enduring creation."
 echmer.002.a: "The Dwemer uplifted them? Remarkable."
 echmer.002.b: "Does the Noraken clan still live?"

 echmer.003.t: "The Art of Echolalia Fantasia"
 echmer.003.desc: "The envoy demonstrates Echolalia Fantasia — a discipline of pure sound-manipulation that blurs the lines between science and magic. They shape stone with a hum, map an entire room blindfolded by clicks and echoes, and transmit a complex message across a vast hall without speaking a word."
 echmer.003.a: "I will dedicate myself to this art."
 echmer.003.b: "Perhaps in time — for now, other duties call."

 echmer.004.t: "The Echoes Speak Clearly Now"
 echmer.004.desc: "You close your eyes, and the world resolves into a perfect map of echoes. The tap of a courier's boot, the creak of a distant gate, the heartbeat of your court. Echolalia Fantasia is no longer a curiosity — it is a lens through which you perceive everything."
 echmer.004.a: "The echoes speak to me now."

 echmer.005.t: "The First Lesson"
 echmer.005.desc: "The Echmer scholar unrolls a long scroll covered in spiralling tonal notation, and begins to hum. You follow, clumsily at first — your throat is not shaped like theirs — but something resonates."
 echmer.005.a: "Begin the lessons."
 echmer.005.b: "I've changed my mind."

 # Traits
 echmer_heritage: "Echmer"
 echmer_heritage_desc: "A member of the bat-mer of Yneslea, uplifted by Dwemer tonal architecture. Echmer are academic, isolationist, and uniquely perceptive due to their echolocation."
 echolalia_adept: "Echolalia Adept"
 echolalia_adept_desc: "Trained in the fundamentals of Echolalia Fantasia — the Echmer's sound-based magical discipline."
 echolalia_master: "Master of Echolalia Fantasia"
 echolalia_master_desc: "A true master of sound-as-magic. This scholar perceives the world through echo and vibration, achieving feats no ordinary court mage could match."
 dwemer_uplifted_lineage: "Dwemer-Uplifted Lineage"
 dwemer_uplifted_lineage_desc: "This Echmer's blood carries the strongest trace of Noraken Dwemer engineering — a mark of both pride and complex feelings toward their creators' vanishing."
 yneslea_scholar: "Yneslea Scholar"
 yneslea_scholar_desc: "Educated at the great academic spires of Yneslea, this character is steeped in the sciences and tonal philosophy of the Echmer."

 # =====================================================================
 #  MAORMER  (Sea Elves of Pyandonea)
 # =====================================================================
 tame_pyandonean_sea_serpent: "Tame a Pyandonean Sea Serpent"
 tame_pyandonean_sea_serpent_desc: "The massive sea serpents of Pyandonea are the Maormer's most fearsome weapon. A Maormer ruler with sufficient skill and courage might bond with one personally."

 seek_orgnum_blessing: "Seek Orgnum's Blessing"
 seek_orgnum_blessing_desc: "King Orgnum, the immortal ruler of Pyandonea who grows younger with each passing year, is said to grant longevity to those he deems worthy. To stand before him is to stand before living history."

 maormer.001.t: "Maormer Raiders!"
 maormer.001.desc: "Ships bearing serpentine banners emerge from the mist. Maormer raiders, pale as seafoam and armed with snake-engraved blades, storm your coastal villages. Their war cries sound like hissing serpents. Mounted on great sea-beasts, their cavalry sinks fishing boats and burns docks."
 maormer.001.a: "Drive them back into the sea!"
 maormer.001.b: "Pay them tribute — buy their silence."

 maormer.003.t: "Call the Storm"
 maormer.003.desc: "The sea witch raises her staff. The Pyandonean horizon darkens as clouds spiral inward, and the sea churns with unnatural fury. This is the storm magic of the Maormer — elemental and ancient."
 maormer.003.a: "Summon the storm — sink their fleets!"
 maormer.003.b: "Save the magic for greater need."

 maormer.004.t: "The Ancient Hatred"
 maormer.004.desc: "For thousands of years, the Maormer have sought to reclaim what was taken from them by the Altmer. Every raid is an act of ancestral vengeance. The blood of the first exiles still calls for retribution."
 maormer.004.a: "The exile shall be avenged!"

 maormer.005.t: "Face the Serpent"
 maormer.005.desc: "The sea serpent coils in the shallows before you — sixty feet of scaled muscle and ancient intelligence. Its head rises to meet your gaze. This is the moment that defines a Maormer warrior."
 maormer.005.a: "Stare it down — project dominance!"
 maormer.005.b: "The beast throws me — I barely escape."

 maormer.010.t: "Bonded with a Sea Serpent"
 maormer.010.desc: "The great serpent lowers its head and allows you to place your hand upon its scales. A bond is formed — the kind that Pyandonean legends are made of. The creature is yours now, and you are, in some way, its."
 maormer.010.a: "Together we shall rule the sea-lanes."

 maormer.015.t: "Before the Immortal King"
 maormer.015.desc: "King Orgnum holds court in his kelp-draped throne room, his ancient eyes bright with a youth they should not possess. He studies you for a long moment, then nods. 'You have proven yourself worthy of the gift,' he says. 'Do you accept what comes with it?'"
 maormer.015.a: "Grant me longevity, great Orgnum."
 maormer.015.b: "I am not yet ready for such a burden."

 maormer.016.t: "Orgnum Grows Younger"
 maormer.016.desc: "Word reaches you that King Orgnum has shed decades. He appears younger now than he did a century ago. The wizards of Pyandonea whisper that his power is growing — that the day he becomes a child once more, he will ascend beyond mortality entirely."
 maormer.016.a: "The king grows stronger with each passing year..."

 # Traits
 maormer_heritage: "Maormer"
 maormer_heritage_desc: "A Sea Elf of Pyandonea — exiled from the Aldmer's mainland realms millennia ago, the Maormer became masters of the sea, snake magic, and storm."
 snake_magic_adept: "Snake Magic Adept"
 snake_magic_adept_desc: "Trained in the serpentine magic traditions of Pyandonea — including the taming of sea serpents and the calling of storms."
 pyandonean_sea_witch: "Pyandonean Sea Witch"
 pyandonean_sea_witch_desc: "A high-ranking Maormer practitioner who combines storm magic, serpent lore, and sea ritual into a formidable magical tradition."
 sea_serpent_master: "Sea Serpent Master"
 sea_serpent_master_desc: "This Maormer has personally bonded with a Pyandonean sea serpent, earning mastery over a creature capable of sinking warships."
 orgnum_blessed: "Orgnum's Blessed"
 orgnum_blessed_desc: "King Orgnum himself has granted this individual a measure of his immortality. They will not age while his favour holds."

 # =====================================================================
 #  SLOAD  (Slug Necromancers of Thras)
 # =====================================================================
 unleash_sload_plague: "Unleash a Sload Plague"
 unleash_sload_plague_desc: "The Sload's mastery of necromancy extends to the creation of engineered plagues. To unleash such a pestilence is an act of warfare that all of Tamriel will remember — and hate you for."

 sload.000.t: "A Sload Necromancer in Our Midst"
 sload.000.desc: "A slug-like figure wrapped in dark robes has been found conducting experiments on the body of a recently-deceased courtier. The creature is a Sload — one of the necromantic slug-folk of Thras. Their presence in any court is viewed with deep suspicion."
 sload.000.a: "Expel this creature from our court!"
 sload.000.b: "Their knowledge is too valuable to waste."

 sload.001.t: "The Thrassian Plague"
 sload.001.desc: "A horror has spread from the Abecean Sea. Ports are filling with the dead. The disease moves with terrible speed and terrible purpose — it is not natural. The Sload of Thras have engineered a plague, and they are using it to raze Tamriel's coasts for slaves and plunder."
 sload.001.a: "Close the ports — let nothing in or out."
 sload.001.b: "The Sload will pay for this."

 sload.005.t: "The All-Flags Navy"
 sload.005.desc: "Never before have Tamriel's naval powers united. Never before has the provocation been so total. An unprecedented alliance — Altmer, Imperials, Redguards, Bretons, and more — is forming to sail against Thras and destroy it utterly. The Sload must answer for the Thrassian Plague."
 sload.005.a: "We will join the fleet!"
 sload.005.b: "Let others deal with Thras."

 sload.010.t: "The Fleet Departs"
 sload.010.desc: "A thousand sails fill the Abecean. The All-Flags Navy is the largest armada Tamriel has ever assembled. The target is the coral-spired island of Thras, and none who sail expect to offer mercy."
 sload.010.a: "Sail for Thras — let us end this."

 sload.015.t: "The Coral Tower"
 # Lore note: The Coral Tower is canonically one of Tamriel's Towers (its Stone is
 # the "Pearl" or Coral Stone).  The specific connection to Coldharbour is a mod
 # interpretation — not established in canonical TES sources.  The flavour is used
 # here to make the Coral Tower feel unique and dangerous.  If adapting this for a
 # stricter canon mod, remove the Coldharbour reference and replace with a generic
 # "resonance of dark magic" description.
 sload.015.desc: "Before the fleet looms the Coral Tower of Thras — a blood-red spire of living coral that claws into the sky, its summit crowned with a flickering blue light. Scholars disagree on that light's nature; some claim it is the Coral Stone's death-pulse, others whisper of older, darker pacts. The Sload's dying cries echo from within. They are calling on something, and it is answering."
 sload.015.a: "Attack the Coral Tower directly!"
 sload.015.b: "Pull back — the tower's magic is too powerful."

 sload.020.t: "Thras Sinks"
 sload.020.desc: "A whirlpool opens where Thras once stood, consuming the island, its coral spires, its undead legions, and — mercifully — the Thrassian Plague with it. The All-Flags Navy has done what no single nation could: erased Thras from the map. For now."
 sload.020.a: "Thras is no more. Let the healing begin."

 sload.025.t: "The Coral Tower Whispers"
 sload.025.desc: "You press your hand against the Coral Tower's base and it thrums with a frequency that bypasses your ears entirely, vibrating in your mind. The Tower speaks — not in words, but in the language of undeath and dominion. It recognises you as its master."
 sload.025.a: "Channel the Coral Tower's power."

 # Traits
 sload_heritage: "Sload"
 sload_heritage_desc: "A slug-like being from the coral archipelago of Thras. The Sload are masters of necromancy and creators of devastating plagues, universally reviled across Tamriel."
 sload_necromancer: "Sload Necromancer"
 sload_necromancer_desc: "Versed in the necromantic arts as practiced by the Sload of Thras, including raising undead armies and crafting alchemical reagents from larvae."
 sload_high_necromancer: "Sload High Necromancer"
 sload_high_necromancer_desc: "The highest order of Sload magical practitioner — capable of raising vast undead legions and channelling the power of the Coral Tower."
 plague_bearer: "Plague Bearer"
 plague_bearer_desc: "This individual carries a weaponised Sload plague strain — a biological weapon of mass destruction that civilised realms fear and despise."

 # =====================================================================
 #  KOTHRINGI  (Silver-Skinned Humans of Black Marsh)
 # =====================================================================
 board_crimson_ship: "Board the Crimson Ship"
 board_crimson_ship_desc: "The Knahaten Flu spreads faster than reason. A ship — the Crimson Ship — is being loaded with Kothringi survivors. To board is to abandon your homeland, perhaps forever, in search of a port that will accept the infected."

 bargain_with_clavicus_vile: "Bargain with Clavicus Vile"
 bargain_with_clavicus_vile_desc: "The Daedric Prince Clavicus Vile offers a way out: survive the Knahaten Flu in exchange for a price you cannot yet guess. The people of Stillrise Village took this bargain. They survived. They also stopped being entirely mortal."

 kothringi.001.t: "The Knahaten Flu"
 kothringi.001.desc: "It begins with the silver-skinned fishermen at the river's edge. By noon they are feverish. By nightfall they are dead. The Knahaten Flu has come — a disease seemingly tailored to destroy the Kothringi people, immune to all known cures and spreading with terrifying speed. Some whisper that the Hist trees engineered it."
 kothringi.001.a: "Seal the borders — no one leaves the marsh!"
 kothringi.001.b: "Flee while we can — this sickness will consume us all."

 kothringi.002.t: "The Flu Spreads"
 kothringi.002.desc: "The Knahaten Flu has been sighted in counties beyond Black Marsh. The silver-skinned dead are stacked at the borders. Other races seem resistant, but no one truly knows — and fear spreads faster than the disease itself."
 kothringi.002.a: "Pray this passes us by."
 kothringi.002.b: "Burn the infected villages — harsh but necessary."

 kothringi.010.t: "Setting Sail on the Crimson Ship"
 kothringi.010.desc: "The docks are choked with frightened faces. You watch your homeland recede into the mist. The ship holds perhaps two hundred Kothringi — all that might survive. There is no certainty of welcome anywhere. There is only the sea, and the hope that somewhere, someone will not turn you away."
 kothringi.010.a: "We sail west — perhaps we will find safe harbour."

 kothringi.011.t: "Turned Away"
 kothringi.011.desc: "The first port flies quarantine flags before the Crimson Ship even clears the headland. The second fires warning shots. The third sends a diplomatic envoy — who delivers the same message: 'You carry death. Sail on.' The Kothringi sail on."
 kothringi.011.a: "We sail on. There must be safe land somewhere."

 kothringi.020.t: "Clavicus Vile's Bargain"
 kothringi.020.desc: "Clavicus Vile appears — smiling, always smiling — with his Hound Barbas at his side. 'Survival,' he says, 'is a simple thing. I offer it to each of you. You need only accept what you become in accepting.' The village of Stillrise waits. The flu waits too, outside the door."
 kothringi.020.a: "We accept — survival above all."
 kothringi.020.b: "We refuse — better true death than Vile's mercy."

 # Traits
 kothringi_heritage: "Kothringi"
 kothringi_heritage_desc: "One of the 'Lustrous Folk' — silver-skinned humans native to Black Marsh, renowned as boatbuilders and sailors. Mostly destroyed by the Knahaten Flu."
 knahaten_immune: "Knahaten Immune"
 knahaten_immune_desc: "This individual has survived the Knahaten Flu and carries immunity — whether through fortune, magic, or Daedric bargain."
 crimson_ship_survivor: "Crimson Ship Survivor"
 crimson_ship_survivor_desc: "A Kothringi exile who sailed away from Black Marsh on the Crimson Ship — turned away from every port, wandering the oceans in search of haven."
 clavicus_bargain_made: "Clavicus Vile's Bargain"
 clavicus_bargain_made_desc: "This ruler bargained with Clavicus Vile for survival during the Knahaten Flu. The price was not yet made clear — but it will be."

 # =====================================================================
 #  KAMAL  (Akaviri Snow Demons)
 # =====================================================================
 kamal.000.t: "The Demons Thaw"
 kamal.000.desc: "Across the Padomaic Ocean, in the land of 'Snow Hell,' something stirs. The Kamal — snow demons frozen solid each winter, thawed each summer — are waking. This year they will not merely raid the Tang Mo. This year they are coming west. Ada'Soom Dir-Kamal rides at their head."
 kamal.000.a: "Let them come — Tamriel will not bow."

 kamal.001.t: "Ada'Soom Dir-Kamal"
 # Lore note: Ada'Soom Dir-Kamal led the historical 2E 572 invasion.
 # The event fires at or after that date (current_date >= 2E.572 in kamal_invasion_possible).
 # "A name that will define this age" replaces the previous "not heard since the Second Era"
 # which was temporally confused — we ARE in the Second Era when this fires.
 kamal.001.desc: "A name that will define this age echoes out of the east: Ada'Soom Dir-Kamal. The greatest Kamal warlord — a snow demon of terrifying martial genius — has thawed. His armies fill the sea horizon. They make no demands, offer no terms. They come to conquer."
 kamal.001.a: "Ada'Soom Dir-Kamal — we will stop you here!"
 kamal.001.b: "Pray the Tribunal can intervene as before."

 # Lore note: The historical Battle of Vivec (2E 572) ended with Dir-Kamal's DEATH,
 # not a retreat.  The battle was won by the Ebonheart Pact coalition — Dunmer, Nords,
 # and Argonians — alongside the Tribunal (Vivec, Almalexia, Sotha Sil).  Vivec played
 # a significant role but did not act alone.  This event represents a scenario where
 # the Tribunal's intervention ends the invasion; in a playthrough where the player
 # defeats the Kamal without Tribunal aid, kamal.020 fires instead.
 kamal.010.t: "The Tribunal Intervenes"
 kamal.010.desc: "The god-warriors of the Tribunal descend upon the battlefield. Vivec leads, Almalexia fights at his side, and the Kamal host — for the first time — knows fear. Ada'Soom Dir-Kamal falls at the edge of Vivec's city as the Ebonheart Pact coalition closes the trap. The Kamal survivors scatter to their ships. Their warlord does not escape with them."
 kamal.010.a: "The Tribunal and the Pact have ended this — for now."
 kamal.010.b: "Dir-Kamal is dead. The coalition holds — barely."

 kamal.020.t: "The Kamal Retreat"
 # Lore note: Dir-Kamal was killed in the historical 2E 572 battle.  This event fires
 # when the player defeats the Kamal WITHOUT Tribunal intervention (kamal.010 represents
 # the Tribunal path).  In this alternate outcome Dir-Kamal is also slain; the Kamal
 # retreat is their leaderless host dissolving.  "Another may rise" acknowledges
 # the Kamal threat is eternal (they thaw every summer) without implying Dir-Kamal himself survived.
 kamal.020.desc: "The Kamal armies dissolve as winter returns. Ada'Soom Dir-Kamal lies dead on the shore, his ice-armour already reclaiming him. His leaderless host scatters to their ships and the Padomaic waves. Dir-Kamal will not thaw again. But Akavir is vast, and snow demons have long memories. Another will rise."
 kamal.020.a: "They return to their frozen realm — for now."

 kamal_invasion_coming_tt: "A Kamal invasion has begun. Ada'Soom Dir-Kamal will march until repelled by force or Tribunal intervention (kamal.010 / kamal.020)."

 # Traits
 kamal_heritage: "Kamal"
 kamal_heritage_desc: "A snow demon from the Akaviri land of 'Snow Hell.' The Kamal freeze solid each winter and thaw each summer, when they invariably invade their neighbours — or Tamriel."
 kamal_thawed: "Thawed and Ready"
 kamal_thawed_desc: "The Kamal has emerged from winter hibernation, fully alert and battle-ready. Their aggression is at its peak."
 dir_kamal_herald: "Herald of Dir-Kamal"
 dir_kamal_herald_desc: "Chosen by the great warlord Ada'Soom Dir-Kamal to lead his vanguard — an honour measured in enemy blood."

 # =====================================================================
 #  TANG MO  (Monkey-Folk of Akavir)
 # =====================================================================
 tang_mo.001.t: "The Community Stands"
 tang_mo.001.desc: "The Kamal come every summer. Every summer, the Tang Mo die, suffer, and endure. But they have never been enslaved. Not for long. When the drumming starts in the deep jungle, when the monkey-folk respond as one, the Kamal remember why this land is never truly theirs."
 tang_mo.001.a: "The community stands as one — repel the demons!"
 tang_mo.001.b: "Seek shelter in the deep jungle — let the demons pass."

 tang_mo.002.t: "The Alliance with Ka Po' Tun"
 tang_mo.002.desc: "The tiger-dragons of Ka Po' Tun have never been friends of Tamriel, but they have always been friends of the Tang Mo. Together, the two peoples have survived eons of Kamal aggression. Now the great tiger-dragons offer renewed alliance."
 tang_mo.002.a: "Together we are stronger than any Kamal horde."

 # Traits
 tang_mo_heritage: "Tang Mo"
 tang_mo_heritage_desc: "One of the 'Thousand Monkey Isles' folk of Akavir — brave, communal, and occasionally touched by a peculiar kind of battle-madness that becomes heroism."
 invasion_repeller: "Invasion Repeller"
 invasion_repeller_desc: "This warrior has personally turned back an Akaviri invasion, earning the deep respect of their community."

 # =====================================================================
 #  ELDER TOWERS
 # =====================================================================
 claim_tower_stone: "Claim a Tower Stone"
 claim_tower_stone_desc: "Each of Tamriel's great Towers contains a Stone — a metaphysical anchor that holds reality itself in place. To become Keeper of such a Stone is to wield one of the most profound responsibilities in the world."

 sabotage_tower_stone: "Sabotage a Rival's Tower Stone"
 sabotage_tower_stone_desc: "If a Tower Stone can be cracked, corrupted, or stolen, the rival's Tower falls silent — and the fabric of reality frays a little further."

 towers.001.t: "Keeper of the Stone"
 towers.001.desc: "You press your palm to the Stone and feel it recognise you — not as a ruler or a champion, but as a necessity. The Tower needs a Keeper. Reality needs an anchor. You are both."
 towers.001.a: "I am Keeper of this Stone — let reality hold firm."

 towers.002.t: "The White-Gold Tower"
 towers.002.desc: "The Ayleids built White-Gold to echo the Ur-Tower — the first Tower, made by the gods themselves. White-Gold holds Cyrodiil in a shape willed by its master. Under mer it was a jungle. Under men it is temperate. What will it be under you?"
 towers.002.a: "Cyrodiil is what we will it to be."

 towers.003.t: "The Adamantine Tower"
 towers.003.desc: "Direnni Tower stands at the edge of time. It was the first thing built after creation — or perhaps it was built so that creation could exist. The Adamantine Tower does not speak in words. It speaks in the weight of aeons."
 towers.003.a: "The Ur-Tower speaks — through silence, everything."

 towers.004.t: "The Heart of Lorkhan"
 towers.004.desc: "Beneath Red Mountain, deep in the volcanic rock of Morrowind, the Heart of Lorkhan beats. It is the Tower's Stone — the severed divine heart of the God Who Tricked the Others into making the world. Its power is absolute. Its nature is tragic."
 towers.004.a: "The Heart of Lorkhan beats beneath the mountain."

 towers.005.t: "The Sabotage"
 towers.005.desc: "Your agents move through shadows that don't belong to this world, following threads of resonance back to the Tower's Stone. The crack in reality, if they succeed, will be invisible to all but the most learned — but its consequences will be felt for centuries."
 towers.005.a: "Our agents strike — the Stone cracks!"
 towers.005.b: "The Stone repels our agents — they are lost."

 towers.010.t: "A Tower Falls Silent"
 towers.010.desc: "There is no dramatic collapse, no earthquake, no flash of light. One moment the Tower hummed with metaphysical purpose. The next it is simply stone. But the silence is louder than any sound — and the realms around it will begin to feel it."
 towers.010.a: "The world shudders... but holds."

 towers.015.t: "The Fabric of Reality Frays"
 towers.015.desc: "Only one Tower still holds. The scholars call it the last anchor. The dreams of every living creature on Nirn have begun to blend at the edges — the boundary between waking and Oblivion, between now and the Dawn Era, has grown terrifyingly thin. If the last Tower falls, what remains of Mundus?"
 towers.015.a: "We must protect what remains — or Mundus falls!"
 towers.015.b: "Let it fracture — we will rebuild from nothing."

 # Traits
 tower_stone_keeper: "Tower Stone Keeper"
 tower_stone_keeper_desc: "This ruler is the acknowledged Keeper of one of Tamriel's metaphysical Tower Stones — an anchor of reality itself. The responsibility is absolute."
 tower_stone_lost: "Tower Stone Lost"
 tower_stone_lost_desc: "The Tower Stone once kept by this ruler has been stolen or destroyed. Reality around their realm grows subtly — and increasingly not so subtly — unstable."

 # =====================================================================
 #  DREUGH
 # =====================================================================
 dreugh.001.t: "The Life-Cycle Turns"
 dreugh.001.desc: "The pull of the deep water calls — or the pull of dry stone calls. The Dreugh life-cycle is unlike any other sentient being's. The transition between sea phase and land phase is a renewal, a rebirth, a shedding of one self for another."
 dreugh.001.a: "I feel the pull of the sea..."
 dreugh.001.b: "I emerge from the depths, renewed."

 dreugh.002.t: "Homage to Old Knocker"
 dreugh.002.desc: "Old Knocker — the ancient Dreugh god, a being of the deep ocean who pre-dates memory — is honoured with the traditional Dreugh rite: a vigil held at the lowest reachable depth, in perfect darkness, where the only sound is the pressure of fathoms of water."
 dreugh.002.a: "Ancient Knocker, hear us from the deep."

 # Traits
 dreugh_heritage: "Dreugh"
 dreugh_heritage_desc: "An ancient aquatic humanoid — part crustacean, part mer-like — that predates most of Tamriel's recorded history. Dreugh live in phases: sea and land."
 dreugh_land_phase: "Land Phase"
 dreugh_land_phase_desc: "Currently living the land phase of the Dreugh life cycle."
 dreugh_sea_phase: "Sea Phase"
 dreugh_sea_phase_desc: "Currently living the sea phase of the Dreugh life cycle — more powerful, but alien even to those who know them."

 # =====================================================================
 #  IMGA
 # =====================================================================
 imga.001.t: "An Imga Aristocrat at Court"
 imga.001.desc: "The great ape enters your throne room with impeccable posture, fur powdered bone-white in the Altmeri fashion, wearing robes cut in the high style of Summerset. Their bearing is entirely, deliberately, earnestly Aldmeri. The Imga of Valenwood have always admired the Mer."
 imga.001.a: "Welcome, great ape — your powder and poise are appreciated."
 imga.001.b: "Their imitation of our ways is... unsettling."

 imga.002.t: "Marukh's Legacy"
 imga.002.desc: "Marukh of the Imga — the prophet who sparked the Alessian Order, who changed the face of the First Empire — began as a great ape in Valenwood who looked at the Altmer and saw something to aspire to. The tension between emulation and self-determination still shapes Imga society."
 imga.002.a: "Marukh spoke truth — the Aldmer are the pinnacle."
 imga.002.b: "Marukh's path is not mine — we are our own people."

 # Traits
 imga_heritage: "Imga"
 imga_heritage_desc: "One of the Great Apes of Valenwood — intelligent, sociable beastfolk who are native to the deep forests and have long held a complicated admiration for Aldmeri culture."
 altmer_imitator: "Altmer Imitator"
 altmer_imitator_desc: "This Imga aristocrat powders their fur white and dresses in the fashion of the Altmer, seeking to emulate the high culture of their elven neighbours."

 # =====================================================================
 #  KEPTU / NEDES
 # =====================================================================
 keptu.001.t: "The Bloodroot Forge"
 keptu.001.desc: "Buried under a collapsed Reach hillfort, your excavators find it: a forge of dark metal and living roots, its fires still smouldering after centuries. This is the Bloodroot Forge of the Keptu — said to rival the Ayleid and Dwemer in its metallurgical output. Its secrets await."
 keptu.001.a: "The Forge's secrets are mine to revive."

 nedes.001.t: "The Old Ways"
 nedes.001.desc: "An elder of Nedic lineage, keeper of a vast oral tradition, sits by your fire and begins to speak. They tell of the pre-merethic world: of the Ehlnofey from which all life descended, of the first migrations from Atmora, of a Tamriel so different from today it might as well be another world."
 nedes.001.a: "Their oral histories predate the First Era."

 # Traits
 keptu_lineage: "Keptu Lineage"
 keptu_lineage_desc: "This ruler carries the blood of the Keptu — an ancient Nedic (or related) tribe known for advanced metallurgy centred on the legendary Bloodroot Forge."
 nedic_elder: "Nedic Elder"
 nedic_elder_desc: "Keeper of oral Nedic traditions that predate the First Era — a living repository of pre-merethic Tamriel's history."

 # =====================================================================
 #  SLOAD CB — ALL-FLAGS NAVY
 #  Strings for the sload_cb.txt casus belli (all_flags_navy_cb)
 # =====================================================================
 all_flags_navy_cb: "All-Flags Navy Punitive Expedition"
 all_flags_navy_cb_desc: "The Thrassian Plague poisons the sea-lanes. The coastal peoples of Tamriel must unite under one navy and sail to Thras — and sink it."

 all_flags_navy_cb_victory_desc: "The All-Flags Navy prevails. The coral spires of Thras sink beneath the waves; the Plague dies with them. This day is remembered."
 all_flags_navy_cb_defeat_desc: "The Navy is broken on Sload reefs and necromancy. The Plague continues to claim lives. The Sload remain."

 # =====================================================================
 #  LORE RACE COOLDOWN MODIFIERS
 #  Empty flag-modifiers used as mechanical cooldowns.
 # =====================================================================
 tower_sabotage_cooldown: "Tower Stone — Sabotage Cooldown"
 tower_sabotage_cooldown_desc: "A period of watchfulness follows tampering with a Tower Stone."
 plague_cooldown_modifier: "Plague — Recovery Period"
 plague_cooldown_modifier_desc: "The land is recovering from a plague outbreak; another cannot take hold so soon."

 # =====================================================================
 #  TSAESCI (Snake-Folk of Akavir)
 #  Added: audit pass 5 — missing peoples
 # =====================================================================
 tsaesci.001.t: "The Tsaesci Envoy"
 tsaesci.001.desc: "A serpent-man stands in your court — sleek, unblinking, every movement a controlled strike. This is a Tsaesci of Akavir: sword-masters who 'ate' the men of their continent and whose disciplined blade art shaped the armies of the Second Empire. They have crossed the seas for reasons of their own."
 tsaesci.001.a: "Welcome — teach our soldiers your methods."
 tsaesci.001.b: "A serpent-man at court? What message does that send?"

 tsaesci.002.t: "The Dragonguard Legacy"
 tsaesci.002.desc: "The blood of the Akaviri Dragonguard runs in your veins. Once, your ancestors served Reman Cyrodiil — the greatest Dragonborn Emperor — as elite guardians. The Dragonguard that became the Blades, the watchers of Dragonblood. That tradition is not dead."
 tsaesci.002.a: "Our ancestors served the Dragonborn Emperor — their legacy is ours."
 tsaesci.002.b: "The old loyalties are gone — we serve no one now."

 tsaesci.003.t: "The Dragonguard Oath"
 tsaesci.003.desc: "The ancient Akaviri sword-oath is offered to you. To join the Dragonguard — even in name, even in spirit — is to carry forward a tradition that stretches from Akavir to the Ruby Throne itself."
 tsaesci.003.a: "I take this oath in the name of the Dragonborn."
 tsaesci.003.b: "The Dragonguard is a relic of a fallen empire — I decline."

 tsaesci.004.t: "Hunter and Guardian"
 tsaesci.004.desc: "The Tsaesci hunted dragons across Akavir — and then found Dragonborn emperors across the sea, and became their guardians instead. The tension between being a hunter and being a sworn protector defines the Tsaesci soul."
 tsaesci.004.a: "We hunted dragons — and found Dragonborn masters instead."
 tsaesci.004.b: "We are hunters, not guards. The old oaths mean nothing."

 tsaesci_heritage: "Tsaesci"
 tsaesci_heritage_desc: "A serpent-person of Akavir — disciplined sword-masters who invaded Tamriel in 1E 2703 and were incorporated into Reman's Dragonguard after their defeat at Pale Pass."
 tsaesci_blademaster: "Tsaesci Blademaster"
 tsaesci_blademaster_desc: "A master of the Akaviri sword discipline — the most precise and lethal martial tradition in the known world."
 akaviri_dragonguard: "Akaviri Dragonguard"
 akaviri_dragonguard_desc: "Member of the ancient Akaviri Dragonguard — elite guardians of Dragonborn emperors, precursors to the legendary Blades."

 # =====================================================================
 #  KA PO'TUN (Tiger-Dragon Folk of Akavir)
 # =====================================================================
 ka_po_tun.001.t: "The Tiger-King Transforms"
 ka_po_tun.001.desc: "Word reaches you from across the sea: King Tosh Raka of Ka Po'Tun is attempting something no mortal has ever achieved — transforming himself into a dragon. Not a metaphor, not a title. An actual, physical, metaphysical dragon. The tiger-king is becoming something beyond."
 ka_po_tun.001.a: "A mortal becoming a dragon? This defies everything we know."
 ka_po_tun.001.b: "If Tosh Raka succeeds, he will be something the world has never seen."

 ka_po_tun.002.t: "An Alliance with the Tiger-Folk"
 ka_po_tun.002.desc: "The Ka Po'Tun have fought the Tsaesci for generations. Now, Tosh Raka's court reaches out — they seek allies beyond Akavir, and your reputation has crossed the ocean. Serve the tiger-king's vision and share in his glory."
 ka_po_tun.002.a: "We stand with Tosh Raka — his dream is our dream."
 ka_po_tun.002.b: "Our people fight the Tsaesci — we have no time for dragon visions."

 ka_po_tun_heritage: "Ka Po'Tun"
 ka_po_tun_heritage_desc: "One of the tiger-dragon folk of Akavir — humanoid tigers in constant war with the Tsaesci, allies of the Tang Mo, and disciples of King Tosh Raka who seeks to transform himself into a dragon."
 tosh_raka_herald: "Herald of Tosh Raka"
 tosh_raka_herald_desc: "A herald of King Tosh Raka — the Ka Po'Tun monarch who is transforming himself into a coloured dragon, an act unprecedented in recorded history."

 # =====================================================================
 #  LILMOTHIIT (Fox-Folk of Black Marsh)
 # =====================================================================
 lilmothiit.001.t: "The Fox-Fires Dim"
 lilmothiit.001.desc: "Your people — the Lilmothiit — have been in Black Marsh since before the Kothringi arrived, since before the Argonians became what they are. Fox-folk with quick minds and quicker feet. But something is wrong. The Knahaten Flu that swept through Black Marsh did not spare us as it spared the Argonians."
 lilmothiit.001.a: "We will not be forgotten — our ways outlive the Flu."
 lilmothiit.001.b: "Perhaps it is the will of the spirits that we fade."

 lilmothiit.002.t: "The Last Hearth"
 lilmothiit.002.desc: "The fires are going out. Clan after clan, the Lilmothiit have fallen to the Knahaten Flu — a sickness the Argonians simply walk through. You tend the last communal hearth of your people. The old stories, the fox-dances, the tail-language — they die with the last of us."
 lilmothiit.002.a: "We are the last. The fire dies."

 lilmothiit_heritage: "Lilmothiit"
 lilmothiit_heritage_desc: "One of the fox-folk of Black Marsh — an intelligent, quick-witted beastfolk distinct from the Khajiit. The Lilmothiit were largely wiped out by the Knahaten Flu beginning c. 2E 560."
 lilmothiit_last_clan: "Last of the Fox-Folk"
 lilmothiit_last_clan_desc: "One of the last surviving Lilmothiit clans, watching their people disappear to the Knahaten Flu. A keeper of the final fox-fires."

 # =====================================================================
 #  REACHFOLK (The Reach — Old Ways)
 # =====================================================================
 reachfolk.001.t: "The Stones Speak"
 reachfolk.001.desc: "The standing stones of The Reach are older than the Nords who claim to have built them. Older than the Empire. Your blood is Reachfolk blood — and tonight, the stones are singing."
 reachfolk.001.a: "The stones speak — the Old Ways are not dead."
 reachfolk.001.b: "The Old Ways are a relic — I will forge my own path."

 reachfolk.002.t: "The Hagraven's Price"
 reachfolk.002.desc: "She stands at the edge of the firelight — neither bird nor woman, neither living nor dead. A Hagraven. She has been watching you for some time. She offers knowledge of the Old Ways, power over the deep magic of The Reach. Her price is your service and secrecy."
 reachfolk.002.a: "The pact is made — her feathers brush my hand and magic flows."
 reachfolk.002.b: "Even the Old Ways have limits — I will not traffic with Hagravens."

 reachfolk.003.t: "The Briarheart Ritual"
 reachfolk.003.desc: "The Hagraven conducts the rite with terrible precision. Your heart — beating, living — is removed and replaced with a briarheart: a thorn of pure Old Ways magic. You die. And then you rise. Different. Stronger. Bound to the Reach in ways that cannot be undone."
 reachfolk.003.a: "The Hagraven tears out my heart — I do not flinch."
 reachfolk.003.b: "No — I choose to remain mortal."

 reachfolk.004.t: "The Longhouse Legacy"
 reachfolk.004.desc: "Durcorach the Black Drake — a Reachman — held the Ruby Throne. His successors, the Longhouse Emperors, ruled the Second Empire for a generation. Reachman blood has sat upon the seat of power before. Your blood. The stone of The Reach carries the memory of Empire."
 reachfolk.004.a: "Durcorach held the Ruby Throne — so might we again."
 reachfolk.004.b: "The Empire is gone — the Reach is enough."

 forge_hagraven_pact_desc: "The Hagravens of The Reach offer power in exchange for loyalty to the Old Ways. A pact with one of these ancient crone-witches grants access to the deep magic of the standing stones."
 reachman_heritage: "Reachfolk"
 reachman_heritage_desc: "A human native to The Reach — practitioners of the Old Ways, the ancient nature-magic and Daedra-worship of the mountain borderlands."
 reachman_briarheart: "Briarheart"
 reachman_briarheart_desc: "A Reachfolk warrior who underwent the Briarheart ritual — their mortal heart replaced by a thorn of Old Ways magic. Powerful beyond normal measure, bound to The Reach."
 hagraven_pact: "Hagraven's Pact"
 hagraven_pact_desc: "A formal pact with a Hagraven — trading fealty for access to the deep magic of the Old Ways. Mainstream faiths view this with deep suspicion."

 # =====================================================================
 #  HIST / ARGONIAN
 # =====================================================================
 hist.001.t: "The Root-Memory Calls"
 hist.001.desc: "You feel it before you hear it — a pressure at the base of your skull, a warmth in your blood. The Hist near your capital is calling. Not with words. Never words. With something older, more patient, more vast."
 hist.001.a: "I go to the tree — the root-memory calls."
 hist.001.b: "The tree can wait — there are more pressing matters."

 hist.002.t: "The Sap of Ages"
 hist.002.desc: "You press your tongue to the bark and the world dissolves. A thousand years of Black Marsh flow through you — migration patterns of Saxhleel clans, the first contact with men, the war against the Ayleids, the slow encroachment of the Empire. The Hist remembers everything."
 hist.002.a: "The ages pour through me — I see Tamriel as the Hist see it."
 hist.002.b: "The visions are too vast — I withdraw before I am lost."

 hist.003.t: "The An-Xileel Gathers"
 hist.003.desc: "The An-Xileel have always been the Hist's most devoted servants — not because they follow blindly, but because they understood before others that the Hist do not deceive. They see what others miss. They are gathering. And they want you."
 hist.003.a: "We are the Hist's warriors — An-Xileel."
 hist.003.b: "The An-Xileel's zeal goes too far — even for me."

 hist.004.t: "The Hist Is Afraid"
 hist.004.desc: "The Hist does not know fear the way mortals know it. But you feel something in the root-memories tonight that is close enough: a trembling, a recalculation of futures. Something is coming. The Hist has seen this before, in the darkness before recorded time."
 hist.004.a: "The trees have seen this darkness before — we prepare."
 hist.004.b: "The Hist's fear becomes mine — we must act immediately."

 commune_with_hist_desc: "The Hist trees of Black Marsh are ancient beyond reckoning. An Argonian ruler who communes with their local Hist tree may receive the accumulated memories of thousands of years — at the cost of time spent in deep meditation."
 hist_bonded: "Hist-Bonded"
 hist_bonded_desc: "Deeply bonded to a Hist tree — this ruler has communed with the ancient world-memory of Black Marsh and carries its accumulated wisdom."
 an_xileel_warrior: "An-Xileel"
 an_xileel_warrior_desc: "A warrior of the An-Xileel faction — Argonians who follow the Hist's guidance most zealously, understanding that the trees see threats long before mortal eyes do."

 # =====================================================================
 #  TWO MOONS PATH (Khajiit Lunar Faith)
 # =====================================================================
 two_moons.001.t: "The Twin Moons Rise"
 two_moons.001.desc: "Both moons are full tonight — Jode vast and golden, Jone sharp and silver. In the history of the Khajiit, this has always meant one thing: somewhere in Elsweyr, a new Mane is born. Or named. You look at your fur in the moonlight, and the pattern seems... different."
 two_moons.001.a: "Both moons are full — and they call my name."
 two_moons.001.b: "This honour... I am not ready to lead all of us."

 two_moons.002.t: "The Moon Sugar Rite"
 two_moons.002.desc: "The Two Moons Path teaches that Jode and Jone are not simply lights in the sky but the twin eyes of a god. Moon sugar — crystallised from the sugarcane that grows where moonlight touches the earth of Elsweyr — is the sacrament of this faith. Tonight, under twin moons, your priests prepare the rite."
 two_moons.002.a: "The moons shine on us — Jode and Jone hear our prayers."
 two_moons.002.b: "The ritual is observed, but I keep my mind clear."

 two_moons.003.t: "An Audience with the Mane"
 two_moons.003.desc: "All Khajiit know the Mane — the singular spiritual leader, born when both moons are full, chosen by the twin eyes of the divine. To seek an audience is both a political act and a sacred pilgrimage."
 two_moons.003.a: "The Mane's blessing — moonlight on fur, stars in eyes."
 two_moons.003.b: "I seek the Mane's wisdom, not just their blessing."

 the_mane: "The Mane"
 the_mane_desc: "The singular spiritual leader of all Khajiit — born when both moons are simultaneously full, the Mane is the living embodiment of the Two Moons Path. All Khajiit defer to the Mane's authority."
 moonsugar_devotee: "Two Moons Devotee"
 moonsugar_devotee_desc: "A Khajiit devoted to the sacred rituals of the Two Moons Path, including the ceremonial use of moon sugar in communion with Jode and Jone."

 # =====================================================================
 #  Y'FFRE / GREEN PACT (Bosmer Faith)
 # =====================================================================
 bosmeri.001.t: "The Forest Speaks"
 bosmeri.001.desc: "The canopy of Valenwood has its own language — not words, but a presence, a weight of green intent. Y'ffre, the Storyteller, the forest god of the Bosmer, is not subtle when he wants to be heard. Tonight the forest is very, very loud."
 bosmeri.001.a: "The forest speaks — Y'ffre's pattern flows through everything."
 bosmeri.001.b: "The old stories are stories — I walk my own path."

 bosmeri.002.t: "The Green Pact's Demand"
 bosmeri.002.desc: "The Green Pact is not negotiable. A Bosmer who eats plant matter — bread, fruit, anything that was once rooted in the earth — violates the Pact and offends Y'ffre. And a Bosmer who kills but does not consume what they kill violates it too. Your enemy has fallen. The Pact demands its due."
 bosmeri.002.a: "The Pact demands it — we consume what we kill."
 bosmeri.002.b: "The Pact is about respect — but this goes too far."

 bosmeri.003.t: "Y'ffre — Hear Us!"
 bosmeri.003.desc: "The trees know. The trees have always known when the Bosmer cry out together — when a single voice becomes thousands, when grief becomes a weapon and love becomes a transformation. The Wild Hunt is not invoked lightly. Once called, participants rarely return to themselves. They become part of the forest."
 bosmeri.003.a: "Y'ffre — hear us. HEAR US. We call the Hunt!"
 bosmeri.003.b: "The Hunt is too great a cost — we fight as mortals."

 bosmeri.004.t: "The Forest Is Quiet"
 bosmeri.004.desc: "It is over. The Wild Hunt has passed through like a storm. What remains is silence, and a forest that remembers what it tasted. Some of the hunters never returned to their forms. Their shapes merge with the trees. Y'ffre took them home."
 bosmeri.004.a: "The monsters recede. The forest is quiet. We won."

 declare_green_pact_observance_desc: "Formally declare the observance of Y'ffre's Green Pact — the ancient covenant between the Bosmer and the forest deity that forbids eating plant matter and demands ritual consumption of fallen enemies."
 green_pact_devotee: "Green Pact Devotee"
 green_pact_devotee_desc: "A Bosmer sworn to the strict observance of Y'ffre's Green Pact — the ancient covenant that forbids consuming plant matter and demands eating fallen enemies."
 wild_hunt_called: "Wild Hunt Participant"
 wild_hunt_called_desc: "A Bosmer who participated in the Wild Hunt — the collective transformation into unstoppable monsters called upon Y'ffre's name. Few participants fully return to themselves."

 # =====================================================================
 #  AYLEID RUINS
 # =====================================================================
 ayleid.001.t: "The Ayleid Well"
 ayleid.001.desc: "Your scholars have found it beneath a collapsed hillside: an Ayleid ruin, intact. White stone, vaulted arches, star-maps in the ceiling that still faintly glow. At its heart, a Well of the Ancestors — a cistern of magical energy charged by Ayleid metaphysics and still functioning after a thousand years."
 ayleid.001.a: "The Ayleid well still functions — wild magic answers our touch."
 ayleid.001.b: "The ruins are dangerous — seal them and move on."

 survey_ayleid_ruin_desc: "Commission a scholarly survey of Ayleid ruins in your territory. The Heartland High Elves built extensively across Cyrodiil; their ruins, Wells, and artefacts still hold considerable magical and historical value."
 ayleid_bloodline: "Ayleid Bloodline"
 ayleid_bloodline_desc: "A claim of descent from the Ayleid — the Heartland High Elves who built the first civilisation of Cyrodiil. A mark of ancient prestige among Colovian nobility."

 # =====================================================================
 #  SNOW ELF / CHANTRY OF AURI-EL
 # =====================================================================
 snow_elf.001.t: "The Last Knight of Auri-El"
 snow_elf.001.desc: "High in the glaciers of Skyrim, the Chantry of Auri-El still stands — maintained by a single Snow Elf who has prayed there since before the Second Era began. The Falmer who rot in the Dwemer ruins are his kin, transformed by blindness and servitude into monsters. He alone was spared. He alone still prays."
 snow_elf.001.a: "In the ice, one Snow Elf still prays — and Auri-El listens."
 snow_elf.001.b: "A sad relic — but their devotion is still admirable."

 chantry_of_auriel_pilgrimage_desc: "Undertake a pilgrimage to the Chantry of Auri-El — a remote sanctuary in Skyrim's glaciers maintained by the last true Snow Elf, Knight-Paladin Gelebor. The Chantry is one of the few places where the Snow Elf faith survives in any form."
 snow_elf_legacy: "Snow Elf Legacy"
 snow_elf_legacy_desc: "Bearer of the Snow Elf legacy — connected to the Chantry of Auri-El and the ancient faith of the Children of the Snow, whose people were nearly annihilated by the Nords and then enslaved by the Dwemer."

 # =====================================================================
 #  ALESSIAN ORDER REMNANTS
 # =====================================================================
 alessian.001.t: "The Doctrines Endure"
 alessian.001.desc: "The Alessian Order is gone — shattered at Glenumbria Moors, discredited by the Reman dynasty. But their Doctrines survive: in monastery libraries, in the margin-notes of Imperial scholars, in the obsessions of a certain kind of religious fanatic. You have found such a collection. The Doctrines are wrong about many things. But they are not without insight."
 alessian.001.a: "The Alessian Doctrines — flawed, yes, but a monument of faith."
 alessian.001.b: "The Doctrines brought ruin — I will not revive their poison."

 alessian_doctrine_scholar: "Alessian Scholar"
 alessian_doctrine_scholar_desc: "A scholar of the Alessian Doctrines — the theocratic texts that dominated the First Empire for 2000 years. Studies them critically, reviving insights while noting their dangerous theological intolerance."

 # =====================================================================
 #  NEW TOWER SITES (audit pass 5)
 # =====================================================================
 towers.006.t: "The Crystal Tower Speaks"
 towers.006.desc: "The Crystal Tower of Summerset is not merely tall — it is the materialization of the Aldmeri principle of nullity, the idea that the universe was created from a perfect and complete absence. Its Stone does not feel like power. It feels like silence so total that the noise of the world seems an intrusion."
 towers.006.a: "The Crystal speaks the language of pure absence — and perfect order."

 towers.007.t: "The Mountain Breathes"
 towers.007.desc: "Snow Throat is not like other Towers. There is no building, no stone chamber, no Well. The mountain itself is the Tower. The Stone is the mountain — and the mountain breathes. Every exhale is a Word of Power half-spoken."
 towers.007.a: "The mountain breathes — and its breath is the Thu'um."

 towers.008.t: "The Living Seed"
 towers.008.desc: "Falinesti does not stand still. The walking city moves through Valenwood on ancient paths that only the city itself knows, and at its heart is not a throne room but a hollow in the oldest tree — a seed that never planted itself because it is already growing into everything."
 towers.008.a: "The living seed pulses — Falinesti walks because Y'ffre wills it."

 # =====================================================================
 #  NEW MODIFIER DISPLAY NAMES (cooldowns from new systems)
 # =====================================================================
 akaviri_sword_tradition_modifier: "Akaviri Sword Tradition"
 akaviri_sword_tradition_modifier_desc: "The Tsaesci blade discipline has taken root in this realm's martial culture."
 akaviri_dragonguard_cooldown: "Dragonguard Oath — Cooldown"
 akaviri_dragonguard_cooldown_desc: "A period of reflection follows the Dragonguard oath."
 tosh_raka_revelation_modifier: "Revelation of the Tiger-King"
 tosh_raka_revelation_modifier_desc: "The knowledge of Tosh Raka's dragon transformation still reverberates."
 lilmothiit_refuge_modifier: "Lilmothiit Refuge"
 lilmothiit_refuge_modifier_desc: "A Lilmothiit clan has found shelter here, contributing to trade and culture."
 lilmothiit_extinction_cooldown: "Lilmothiit — Extinction Arc"
 lilmothiit_extinction_cooldown_desc: "The weight of being among the last of your kind cannot be revisited soon."
 old_ways_county_modifier: "Old Ways Governance"
 old_ways_county_modifier_desc: "This county is governed according to Reachfolk Old Ways traditions."
 briarheart_power_modifier: "Briarheart Strength"
 briarheart_power_modifier_desc: "The magic of the briarheart thorn courses through this warrior."
 hagraven_pact_cooldown: "Hagraven Pact — Cooldown"
 hagraven_pact_cooldown_desc: "A Hagraven pact cannot be revisited soon — such bargains are made once."
 wild_hunt_aftermath_modifier: "Wild Hunt's Legend"
 wild_hunt_aftermath_modifier_desc: "The Wild Hunt passed through here — and is not forgotten."
 wild_hunt_cooldown: "Wild Hunt — Generational Cooldown"
 wild_hunt_cooldown_desc: "The Wild Hunt cannot be called again so soon; Y'ffre does not answer twice in a generation."
 hist_communion_modifier: "Hist Communion"
 hist_communion_modifier_desc: "The accumulated wisdom of the Hist's root-memory still flows through this ruler."
