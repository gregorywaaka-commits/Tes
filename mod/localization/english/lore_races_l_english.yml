 apocrypha_wandering: "Lost in Apocrypha"
 apocrypha_wandering_desc: "This character is navigating the infinite stacks of Hermaeus Mora's realm."

 black_book_insight: "Apocryphal Insight"
 black_book_insight_desc: "Knowledge drawn from a Black Book has permanently sharpened this character's scholarly faculties."

 black_book_cunning: "Apocryphal Cunning"
 black_book_cunning_desc: "Knowledge drawn from a Black Book has rewired this character's understanding of deception and hidden truths."

