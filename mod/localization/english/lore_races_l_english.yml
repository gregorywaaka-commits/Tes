 barrow_expedition_active: "Barrow Expedition Underway"
 barrow_expedition_active_desc: "A formal expedition is currently exploring a nearby Nordic barrow."

 word_wall_resonance: "Word Wall Resonance"
 word_wall_resonance_desc: "This character stood before a Word Wall and allowed its inscription to resonate. The Word of Power is slowly being absorbed."

