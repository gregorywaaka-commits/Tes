l_english:

 # =====================================================================
 #  HIST / SAXHLEEL — DEEP TIME VISIONS AND THE WILD HUNT
 # =====================================================================

 # ---- hist_vision.000 — The Hist Remembers ----

 hist_vision.000.t: "The Hist Remembers"
 hist_vision.000.desc: "It is not a dream — you are awake when it arrives, standing in the ordinary light of an ordinary room.  But then the light changes.  The walls become translucent, and behind them you see roots.  Roots going down farther than any building has foundations, farther than any geography you were taught to name.  The Hist does not speak.  It remembers.  And in its remembering, it shares.  You are offered a glimpse of something so old that your mind has no shelf to put it on.  Something that was here before the first war.  Before the first king.  Before the first word.  You have one choice to make: receive it or refuse it."
 hist_vision.000.a: "I let the vision carry me. I go where the roots lead."
 hist_vision.000.b: "It is too vast. I pull back before it swallows me whole."

 # ---- hist_vision.001 — The Before-Time ----

 hist_vision.001.t: "The Before-Time"
 hist_vision.001.desc: "The Hist shows you the second layer.  The first vision was immensity — a sense of depth without content.  This one has content.  You see the moment before the world was set.  You see the argument that preceded creation — not gods in negotiation but forces folding against forces, some of them choosing to become what they are and some of them having it chosen for them.  The Hist was there.  It did not participate.  It watched, and it remembered, and now it remembers it for you.  The official account of the world — the one taught in every temple from Elsweyr to Skyrim — is not wrong exactly.  But it is much younger than what you are looking at now."
 hist_vision.001.a: "I share this. The world should know what the Hist has carried all this time."
 hist_vision.001.b: "This is mine alone. I will carry it in silence, as the Hist has."
 hist_vision.001.c: "Memory older than gods — and I cannot trust my own eyes when I look at it."

 # ---- hist_vision.002 — The Hist's Warning ----

 hist_vision.002.t: "The Hist's Warning"
 hist_vision.002.desc: "The sap runs differently today — cooler, or thicker, or somehow more urgent in a way you feel before you understand.  The Hist does not see the future.  It reads the present the way old wood reads weather: through pressure and moisture and the particular tension in the grain.  Something is coming.  A great death — not a battle in the ordinary sense, but a weight pressing toward you from a direction you cannot name yet.  The roots know.  You must decide what to do with what the roots know."
 hist_vision.002.a: "I prepare. Walls first — every answer after."
 hist_vision.002.b: "I bring this to the Elders. Let them read the roots alongside me."
 hist_vision.002.c: "The Hist has misread the weather before. I will not be moved by this."

 # ---- hist_vision.003 — The Hist Grand Convocation ----

 hist_vision.003.t: "The Hist Grand Convocation"
 hist_vision.003.desc: "You have travelled deeper into Argonia than maps go — south and south and south until the canopy closed above you like a ceiling and the air became water and every step required negotiation with the ground.  And then the grove.  The oldest grove.  The Hist trees here are so large their root-systems form the floor; you are walking on wood that is also alive, also aware, also paying attention to your footfall.  At the centre, elders of the Saxhleel who have made this journey before sit in silence, backs against trunks that remember the Before-Time.  Someone offers you a vessel of sap.  It is not symbolic.  The bonding it offers is permanent.  You understand, standing here, that this is what the Hist has been waiting to offer you."
 hist_vision.003.a: "I drink. I am theirs entirely — and they are mine."
 hist_vision.003.b: "I cannot. The price is too complete. I am not ready to be so fully known."

 # ---- hist_vision.010 — The Wild Hunt is Called ----

 hist_vision.010.t: "The Wild Hunt is Called"
 hist_vision.010.desc: "There is a moment, before it begins, when you still have a name.  You have stood in this decision long enough to know what it means — not strategically, not politically, but in the body.  The Wild Hunt does not differentiate between combatants and bystanders, between the guilty and the proximate.  It does not end cleanly.  The forest-people do not return from it unchanged.  You are not requesting a weapon.  You are becoming one.  Your enemies will be consumed.  You know this with the certainty of roots pressed through stone.  You call it anyway.  The forest hears."
 hist_vision.010.a: "It is called. May what remains of me, afterward, remember why."

 # ---- hist_vision.011 — The Hunt Passes ----

 hist_vision.011.t: "The Hunt Passes"
 hist_vision.011.desc: "The forest is silent.  It is the particular silence that follows a sound that has been going on so long you forgot to call it noise — and now it has stopped.  You are standing in a clearing that was not a clearing before.  You are yourself again, mostly, in ways that matter mostly.  The enemy is not here anymore.  Neither is some of the landscape.  Neither is something that used to live behind your eyes.  You know exactly what was done.  You were there.  You called it.  And now the world has to reckon with the silence left behind, and so do you."
 hist_vision.011.a: "I account for it. I name each one. I carry the weight because I must."
 hist_vision.011.b: "I do not mourn the necessary. The Hunt was called; it answered; we survived."

 # ---- Decisions ----

 travel_to_hist_convocation_desc: "The Hist Grand Convocation is held in the oldest grove in Murkmire — deeper into Black Marsh than most maps acknowledge.  To attend is to offer the Hist your full attention, and to receive, if you are found worthy, a deeper bonding than any surface-world connection allows.  The journey costs three hundred prestige — not in gold but in the political time a ruler must take from governance.  What waits at the end is permanent."
 call_the_wild_hunt_desc: "The Wild Hunt is the most absolute weapon in the arsenal of those called to it.  It cannot be aimed precisely.  It cannot be recalled early.  It transforms its callers and is not obligated to transform them back.  Enemies in its path will not survive.  Nor will the landscape.  Nor will whatever part of you believed you would never do this.  Call it only when you are certain — not that it is just, but that it is necessary."

 # ---- Traits ----

 hist_elder_bonded: "Hist Elder-Bonded"
 hist_elder_bonded_desc: "This ruler has drunk the sap of the oldest Hist in Murkmire and emerged from the Grand Convocation with a permanent and profound deepening of their connection to the collective memory of the Hist.  They do not merely receive visions now — they are woven into the root-network.  What the Hist knows, they know.  What the Hist remembers, they carry.  The learning that comes from this is not bookish; it is the direct inheritance of root-memory older than any written record on Nirn."

 # ---- Modifiers ----

 hist_vision_insight: "Hist Vision: Before-Time Insight"
 hist_vision_insight_desc: "The ruler has received and retained knowledge from the Hist's creation-era memory — the Before-Time, before the world was set in the form it currently holds.  This is not academic knowledge.  It is structural.  The world looks slightly different once you have seen the argument that preceded it."

 hist_warning_defensive: "Hist Warning: Defensive Readiness"
 hist_warning_defensive_desc: "The Hist has sensed approaching violence and the ruler has responded with preparation rather than dismissal.  Martial discipline is heightened.  Defensive dispositions are reviewed.  The border guards are quietly but unmistakably more alert."

 wild_hunt_unleashed: "Wild Hunt: Unleashed"
 wild_hunt_unleashed_desc: "The Wild Hunt has been called and is running.  The forest-people in their transformed state are devastatingly effective combatants — but the ruler who called them has not emerged from the transformation untouched.  The horror of what you have become in this moment is real, and it sits at the back of every decision you make while the Hunt is running."

 wild_hunt_aftermath: "Wild Hunt: Aftermath"
 wild_hunt_aftermath_desc: "The Hunt has passed.  The silence it leaves behind is not peaceful — it is the silence of something that was and no longer is.  Trade routes avoid the affected region.  Subjects speak more quietly.  The income of the realm falls as the wider world absorbs what was done.  The prestige this ruler once held is measured now against what it cost."
