l_english:
 # ═══════════════════════════════════════════════════════════════
 #  THE WALKING WAYS — Core Localization
 # ═══════════════════════════════════════════════════════════════

 # ─── Awareness Event ───
 walking_ways.000.t: "The Walking Ways"
 walking_ways.000.desc: "A scholar arrives in curious circumstances — or perhaps appears in a dream, or in a book written in a hand that has not yet touched the page. The words they carry are not comfortable. There are paths, they say, that mortals have walked before to become something other than mortal. The paths are called the Walking Ways. They are not metaphor. They are not heresy.\n\n[They are something more precise.]"
 walking_ways.000.a: "Teach me. I will consider the paths."
 walking_ways.000.b: "I have walked far enough."

 # ─── Path Selection ───
 walking_ways.path_selection.t: "The Paths Await"
 walking_ways.path_selection.desc: "The Walking Ways have been named. The choice of which to walk remains. Each path requires something specific — a capacity, a trait, a history of choices already made."
 walking_ways.path_selection.a: "I will choose my path."
 walking_ways.path_selection.b: "I am not ready yet."

 # ─── World Notify ───
 walking_ways.world_notify.t: "A Rumour from Afar"
 walking_ways.world_notify.generic: "Something has changed in [scope:source.char_name|U]'s realm in [scope:source.primary_title.name]. Scholars disagree on what. They do not disagree on whether."
 walking_ways.world_notify.chim_sovereign: "A philosopher-king in [scope:source.primary_title.name] has ceased to dream, and yet continues. The Psijic Order has sent a message. They say only: 'Again.'"
 walking_ways.world_notify.mantle_talos: "In [scope:source.primary_title.name], [scope:source.char_name|U] has walked in Talos's footsteps long enough that the footsteps are now theirs. Thalmor agents across Tamriel have been recalled for briefing."
 walking_ways.world_notify.mantle_arkay: "The priests of Arkay in [scope:source.primary_title.name] have begun leaving offerings at the ruler's door. They say [scope:source.char_name|U] has seen the seam between the living and the cycle — and is no longer merely on one side of it."
 walking_ways.world_notify.mantle_kynareth: "The wind changed over [scope:source.primary_title.name] without reason. Birds flew in patterns that do not correspond to any migration. The Greybeards have taken note."
 walking_ways.world_notify.mantle_azura: "From Azura's shrine near [scope:source.primary_title.name], her priests sent a message that arrived before it was written: 'The distinction is complete.'"
 walking_ways.world_notify.mantle_meridia: "A light has gone on in [scope:source.primary_title.name] that has no source the architects can find. Vampires in the neighbouring realm have begun to avoid the border."
 walking_ways.world_notify.mantle_lorkhan: "The realm of [scope:source.primary_title.name] trembles differently today. A ruler has walked Lorkhan's full pattern — sacrifice, wound, creation, persistence. Scholars of cosmological architecture note that the weight from Red Mountain shifted slightly. The Shezarrines stir."
 walking_ways.world_notify.mantle_stendarr: "Priests of Stendarr across Tamriel report an unusual peace settling near [scope:source.primary_title.name]. The weak there find their burdens lighter. The Vigil of Stendarr has issued a rare commendation. Something of Stendarr walks in [scope:source.char_name|U]."
 walking_ways.world_notify.mantle_boethiah: "Courts near [scope:source.primary_title.name] have begun losing their most troublesome rivals under circumstances no one can explain. The Tribunal's Anticipation of Almalexia has a new pattern expressing itself. Dunmer theologians call this the Attribution's Full Share."
 walking_ways.world_notify.mantle_mephala: "A message arrived today from [scope:source.primary_title.name] that reached its destinations before it was written. It contained only this: [scope:source.char_name|U] is no longer weaving. They are the web. The Morag Tong has taken note."
 walking_ways.world_notify.mantle_hircine: "The Hunting Grounds are closer to [scope:source.primary_title.name] than they were yesterday. Lycanthropes in the neighbouring realms are restless. The Bloodmoon rose early over [scope:source.primary_title.name]. The Hunt has a new principle walking in [scope:source.char_name|U]."
 walking_ways.world_notify.psijic: "The Psijic Order has sent a rare message to every major court: one who pursued the Old Ways has completed the Endeavour. The message concludes: 'Time is now optional for them.'"
 walking_ways.world_notify.enantiomorph: "Something has gone wrong with the pattern. The Hero of [scope:source.primary_title.name] is no longer the Hero. Those with experience in cosmological architecture are advised to update their maps."
 walking_ways.world_notify.amaranth: "The dream has changed.\n\n[There is no further message. There is no messenger. The fact of it, however, is impossible to dispute.]"
 walking_ways.world_notify.a: "Curious."

 # ─── Abandonment ───
 walking_ways.abandon.t: "The Path Not Taken"
 walking_ways.abandon.desc: "To step off the Walking Way is not a defeat. The path does not pursue those who leave it. It simply waits. Or does not wait. It is difficult to say whether paths wait."
 walking_ways.abandon.a: "Another time. Or never."

 # ─── Decision: Choose Walking Way ───
 choose_walking_way_desc: "I have been introduced to the Walking Ways. Each path requires something different — a history, a capacity, a willingness to become something I am not yet. This is the moment of commitment."
 choose_walking_way.path_a: "Path A: CHIM Expanded — The Sovereign Dream"
 choose_walking_way.path_a_desc: "CHIM is a door, not a destination. The ruler who has achieved CHIM may now pursue what lies beyond it: operating within the dream with authorial permission. [Requires: chim_achieved]"
 choose_walking_way.path_b_talos: "Path B: Mantling Talos — Walk Until You Are Indistinguishable"
 choose_walking_way.path_b_talos_desc: "Walk in Talos's footsteps until the footsteps are yours. Empire. Wound. Mercy. The Ruby Throne. The pattern completes. [Requires: shezarrine_vessel OR martial 20+ with Imperial/Nordic culture]"
 choose_walking_way.path_b_arkay: "Path B: Mantling Arkay — Walk the Cycle"
 choose_walking_way.path_b_arkay_desc: "Arkay governs the ending of things. Walk with death long enough and it stops following you as a threat. [Requires: learning 14+, compassionate or zealous]"
 choose_walking_way.path_b_kynareth: "Path B: Mantling Kynareth — The Open Sky"
 choose_walking_way.path_b_kynareth_desc: "Wind, generosity, the Word on stone. Kyne's widow walks the sky. You can walk it too. [Requires: brave trait]"
 choose_walking_way.path_b_azura: "Path B: Mantling Azura — Dusk and Dawn [DANGEROUS]"
 choose_walking_way.path_b_azura_desc: "A Daedric mantle is different. Azura does not share her pattern easily. Possession is the failure state. [Requires: chim_seeker or chim_achieved]"
 choose_walking_way.path_b_meridia: "Path B: Mantling Meridia — Uncompromising Light [DANGEROUS]"
 choose_walking_way.path_b_meridia_desc: "Purification absolute. Meridia's light does not warm — it exposes. Walk in it long enough and you become it. [Requires: dawnguard_commander or dawnguard_victory_achieved]"
 choose_walking_way.path_b_lorkhan: "Path B: Mantling Lorkhan — The Doom Drum's Sacrifice"
 choose_walking_way.path_b_lorkhan_desc: "Lorkhan gave up his divine nature to create Mundus and was killed for it. His wound still pulses at Red Mountain. Walk the same path: sacrifice the irreplaceable, survive the wound, build something that endures. [Requires: shezarrine_vessel OR martial 18+ stewardship 14+ with Nordic/Imperial/Shezarrine tie]"
 choose_walking_way.path_b_stendarr: "Path B: Mantling Stendarr — Mercy and Righteous Might"
 choose_walking_way.path_b_stendarr_desc: "Stendarr stood with Alessia when she needed steadiness. He is the most present of the Divines. Rule with mercy when cruelty would be easier. Aid the weak. Oppose corruption not through disgust but through duty. [Requires: stewardship 14+, compassionate or generous or zealous]"
 choose_walking_way.path_b_boethiah: "Path B: Mantling Boethiah — Consume the Rival [DANGEROUS]"
 choose_walking_way.path_b_boethiah_desc: "Boethiah consumed Trinimac entirely. Treachery becomes creation; destruction becomes a kind of making. The mantler must consume rivals as completely. Possession risk: Boethiah does not share Attribution's Share. [Requires: intrigue 16+, committed betrayal or regicide, Dunmer/daedric tie]"
 choose_walking_way.path_b_mephala: "Path B: Mantling Mephala — The Spiral Skein [DANGEROUS]"
 choose_walking_way.path_b_mephala_desc: "Mephala taught the Chimer to murder in secret because Mundus runs on hidden threads. Weave until you cannot distinguish your web from hers. Possession risk: the Spiral Skein has no outside edge. [Requires: intrigue 18+, Morag Tong or Dark Brotherhood contact]"
 choose_walking_way.path_b_hircine: "Path B: Mantling Hircine — The Hunt Itself [DANGEROUS]"
 choose_walking_way.path_b_hircine_desc: "Hircine demands the chase above the kill. Respect for prey that fights back. The clean death as the highest honour. Become the principle of the hunt, not merely its participant. Possession risk: the Hunt does not pause for mantlers. [Requires: martial 16+, lycanthropy or great hunt]"
 choose_walking_way.path_c: "Path C: The Psijic Endeavour — The Old Ways"
 choose_walking_way.path_c_desc: "Not learned. Remembered. The Psijic Order's path to temporal perception and the transcendence of ordinary urgency. [Requires: learning 16+, scholar/psijic_contact/chim_seeker]"
 choose_walking_way.path_d: "Path D: The Enantiomorph — The Rebel's Pattern"
 choose_walking_way.path_d_desc: "Every Hero needs an enemy. You can choose to be that enemy. Not evil — necessary. [Requires: intrigue 16+, deceitful/paranoid/ruthless or regicide]"
 choose_walking_way.path_e: "Path E: The Amaranth — The New Dream [HIDDEN]"
 choose_walking_way.path_e_desc: "CHIM was the door. You have walked every hallway. This room has no name. [Requires: chim_achieved + any path completed]"
 choose_walking_way.decline: "I am not ready."
 choose_walking_way.decline_desc: "This is not cowardice. The paths do not close. But the moment passes."

 # ─── Decision: Psijic Rewind ───
 invoke_psijic_rewind_desc: "Once per reign, I may perceive a moment before it happens and act differently. The Psijic Endeavour trained this capacity. The moment is now."

 # ─── Decision: Enantiomorph Creed ───
 enantiomorph_rebel_creed_desc: "The Rebel does not fight for the Hero. The Rebel does not fight for causes the Hero would bless. I refuse to join any holy war or crusade. The pattern requires it."

 # ─── Decision: Abandon ───
 abandon_walking_way_desc: "I will step off this path. The progress I have accumulated will be lost. I will not be able to begin again for five years."

 # ─── Path A Events ───
 walking_ways.chim_expanded.intro.t: "CHIM Is a Door"
 walking_ways.chim_expanded.intro.desc: "CHIM was the realisation that one exists within the Godhead's dream and yet still IS. That was the door. The scholar's note — or the voice in the dream, or the text in the margin that wrote itself — makes a new suggestion. The door led somewhere. Something is on the other side of it. Not transcendence. Not escape. Permission. The sovereign operates within the dream with something like authorial authority."
 walking_ways.chim_expanded.intro.a: "CHIM is a door, not a destination."

 walking_ways.chim_expanded.rank1.t: "The First Edit"
 walking_ways.chim_expanded.rank1.desc: "It was a small thing. A conversation that should have gone badly. A contract that should not have held. Something bent around the ruler's intent without being forced to — and snapped back into shape so quickly that no one else noticed. The ruler noticed."
 walking_ways.chim_expanded.rank1.a: "I noticed. I always noticed."

 walking_ways.chim_expanded.rank2.t: "The Court Has Begun to Notice"
 walking_ways.chim_expanded.rank2.desc: "The court has begun to notice.\n\nNot loudly. Not in any way they could articulate. A chancellor who reports that meetings with the ruler tend to resolve the matter before he has finished framing the problem. A steward who says the ledgers sometimes balance in ways she did not calculate. The court is not afraid. But they have begun to bring only their largest problems."
 walking_ways.chim_expanded.rank2.a: "Let them see. It is a useful kind of fear."
 walking_ways.chim_expanded.rank2.b: "I prefer they not notice. I will be more careful."

 walking_ways.chim_expanded.rank3.t: "The Pressure of Imminent Transformation"
 walking_ways.chim_expanded.rank3.desc: "The seams are visible now. Not the physical seams — the dream's seams. The ruler can see where the narrative was stitched together, where the logic was approximate, where the Godhead's dream was — for a fraction of a second, in a fraction of a moment — not paying full attention. This is not destructive knowledge. It is operating knowledge. The ruler is close to understanding how to use it fully."
 walking_ways.chim_expanded.rank3.a: "I am ready."

 walking_ways.chim_expanded.apotheosis.t: "The Sovereign Moment"
 walking_ways.chim_expanded.apotheosis.desc: "The court continues below.\n\nThe ruler is standing at the window of the highest tower, or sitting in a chair in the study, or lying in bed at the moment between sleep and waking — and they understand, now, completely, what the dream is and what they are within it and what they are permitted to do.\n\nThe distinction between understanding and permission collapsed. They did not become the Godhead. They did not become a god. They became a sovereign within the dream — which is something the dream permits, apparently, if you understand it well enough and hold yourself together while understanding it.\n\nThe court continues below. The ruler returns to them. Something small has changed about the way they hold a cup of water."
 walking_ways.chim_expanded.apotheosis.a: "The court continues below."
 walking_ways.chim_expanded.apotheosis.b: "I have always been here. Everything else was elsewhere."

 walking_ways.chim_silence.t: "The Year of Silence"
 walking_ways.chim_silence.desc: "The path requires a year of deep study. Not isolation — but discipline. The court will notice the change in priorities. The gold will go toward scholars and study materials and the quiet that purchasing silence always requires."
 walking_ways.chim_silence.a: "Arrange it."
 walking_ways.chim_silence.b: "Not yet."

 # ─── Three-Fold Compact ───
 walking_ways.three_fold_compact_achieved.t: "The Three-Fold Compact"
 walking_ways.three_fold_compact_achieved.desc: "Azura. Boethiah. Mephala.\n\nThe three Good Daedra of the Dunmer — the Anticipations of Almalexia, Sotha Sil, and Vivec. The rulers of Tribunal all carried aspects of this compact. Their divinity was built on a foundation that included all three.\n\nThis ruler has now walked the pattern of all three. Not as the Tribunal walked it — through the Heart of Lorkhan and Kagrenac's Tools — but through mantling. Through becoming the pattern of what each Daedra represents.\n\nThe Spiral Skein, Attribution's Share, and the threshold of Dusk and Dawn are all present in this ruler simultaneously.\n\nThe Dunmeri clergy will have opinions about this."
 walking_ways.three_fold_compact_achieved.a: "The Anticipations are complete in me."

 # ─── Mephala/Boethiah Pact ───
 walking_ways.mephala_boethiah_pact_achieved.t: "The Twin Darks"
 walking_ways.mephala_boethiah_pact_achieved.desc: "Boethiah consumes. Mephala weaves.\n\nThey are not the same. But they operate in adjacent territory: both require the hidden hand, the act that cannot be traced to its source, the destruction of a rival so complete it becomes a kind of making.\n\nA ruler who has walked both of their patterns understands something that most mortals do not: the void is not empty. It has structure. It can be navigated without being consumed by it — if you have already consumed enough of it yourself.\n\nThe Enantiomorph will be less likely to claim you."
 walking_ways.mephala_boethiah_pact_achieved.a: "Both sides of the shadow. I understand now."

 # ─── CHIM Ego Pushback ───
 walking_ways.chim_ego_pushback.t: "The Dream Noticed"
 walking_ways.chim_ego_pushback.desc: "CHIM is a door that opens inward. The practitioner who walks through it understands that they exist within the Godhead's dream — and that the dream permits certain operations to those who understand it fully.\n\nBut the dream is not a servant. It does not reward those who treat it as a stage for their own ambitions.\n\nSomething was done recently that expressed the ego too loudly. The dream noticed. A milestone on the path has receded. The understanding was smaller than it appeared."
 walking_ways.chim_ego_pushback.a: "The dream noticed. I must be more careful."
 walking_ways.chim_ego_pushback.b: "I refuse this correction."

 # ─── Talos Nordic Empire Milestone ───
 walking_ways.talos_nordic_empire_milestone.t: "The Empire Is Already Yours"
 walking_ways.talos_nordic_empire_milestone.desc: "Tiber Septim's pattern includes the Ruby Throne — but it is not reducible to one seat or one city.\n\nThe pattern is: conquer, unify, hold the centre by being the centre. Rule so that the realm exists because of your specific kind of will and not despite it.\n\nThis ruler has done that. Not at the Ruby Throne. At their own. The pattern recognises the same shape, expressed in different geography."

 # ─── Psijic Active Decisions ───
 artaeum_correspondence_desc: "Artaeum cannot be visited uninvited — the island appears and disappears at the Order's will. But it can be written to. The correspondence must be careful, sustained, and demonstrate that the writer has moved beyond ordinary scholarship. If the Order judges it worthy of reply, they will respond."
 psijic_time_witnessed_desc: "There is a capacity that develops on the Psijic Endeavour: the ability to hold two points in time simultaneously without becoming lost between them. I have not fully mastered it. But I am close enough that I can formally witness a moment — marking the place where past and future are both present — without being pulled in either direction. Once. Today."

 # ─── Decision: Three-Fold Consumption ───
 invoke_three_fold_consumption_desc: "I carry all three. Azura, who transforms at the threshold. Boethiah, who consumes the rival entirely. Mephala, who weaves what remains into the web. Together they are a complete instrument. I will use them once — on the rivals who stand against me — and they will not recover their standing."

 # ─── World Notify — Phase 1 & 2 ───
 walking_ways.world_notify.mantle_dibella: "The court of [scope:source.primary_title.name] has begun to change in ways architects and theologians both struggle to describe. Beauty is not a decoration there — it is a load-bearing element. Temples of Dibella across Tamriel have updated their liturgical texts. Something of Dibella walks in [scope:source.char_name|U]."
 walking_ways.world_notify.mantle_mara: "The priests of Mara across Tamriel report that a covenant has been completed in [scope:source.primary_title.name] that they have not witnessed in living memory. The hearth still burns. The bond held past every loss. [scope:source.char_name|U] has walked Mara's pattern to its end."
 walking_ways.world_notify.mantle_sheogorath: "The Greymarch came to [scope:source.primary_title.name] and stopped. Scholars of Oblivion report that the Shivering Isles have a new ruler. The old Prince found this hilarious. The new one finds it appropriate. Something of the Mad Prince walks in [scope:source.char_name|U] — and it is not entirely comfortable company."
 walking_ways.world_notify.mantle_vivec: "The 36 Lessons of Vivec have been quoted in [scope:source.primary_title.name] in a context that makes their meaning literal. Warrior and poet have resolved into a single pattern in [scope:source.char_name|U]. Dunmeri theologians report that the Anticipation is complete. The pattern of the warrior-poet god walks again."
 walking_ways.world_notify.mantle_almalexia: "The Hands of Almalexia in [scope:source.primary_title.name] have begun leaving offerings at the ruler's door — not from piety, but from recognition. Something of the Mother of Morrowind walks in [scope:source.char_name|U]. The protection held even when the wrath came. That is the pattern."
 walking_ways.world_notify.mantle_sotha_sil: "The Clockwork City somewhere beneath [scope:source.primary_title.name] has begun running differently. Scholars report mechanisms they cannot find, operations they cannot explain, and the sense of a vast withdrawal from the world. Sotha Sil's pattern walks in [scope:source.char_name|U]. The mechanism runs. The clockwork god has gone to tend to it."

 # ─── Decision Options — Phase 1 ───
 choose_walking_way.path_b_dibella: "Path B: Mantling Dibella — The Principle of Beauty"
 choose_walking_way.path_b_dibella_desc: "Beauty is not ornament. It is load-bearing. Dibella's pattern is about becoming the condition under which beauty is possible — in the court, in the realm, in the world. Not sentiment. Architecture. [Requires: diplomacy 18+, generous or charming or art patronage]"
 choose_walking_way.path_b_mara: "Path B: Mantling Mara — Love That Outlasts Loss"
 choose_walking_way.path_b_mara_desc: "Mara's domain is love as covenant — the bond that persists past grief, past loss, past the season that tried to end it. To mantle Mara is to become the principle of enduring love. Not the love of passion. The love that chooses again every morning. [Requires: diplomacy 16+, living children, compassionate or generous or devoted]"
 choose_walking_way.path_b_sheogorath: "Path B: Mantling Sheogorath — The Mad Prince's Footsteps [DANGEROUS]"
 choose_walking_way.path_b_sheogorath_desc: "Sheogorath was Jyggalag before the curse. The Hero of Kvatch mantled him by surviving the Greymarch. Madness is not the absence of reason — it is a reason creation cannot yet follow. Possession risk: the Grey March does not pause for mantlers. [Requires: intrigue 14+, jyggalag_champion or shivering_isles or lunatic or possessed]"

 # ─── Decision Options — Phase 2 (Tribunal) ───
 choose_walking_way.path_b_vivec: "Path B: Mantling Vivec — Warrior and Poet [TRIBUNAL TIER]"
 choose_walking_way.path_b_vivec_desc: "The warrior-poet god. Both male and female. The 36 Lessons. CHIM achieved. Baar Dau suspended by will. Vivec's pattern is contradiction held in balance — art and war, duality and language. Unlocked by completing the Mephala mantle (Anticipation of Vivec). [Requires: Mephala Mantle completed, martial 14+, learning 16+]"
 choose_walking_way.path_b_almalexia: "Path B: Mantling Almalexia — Mother of Morrowind [TRIBUNAL TIER]"
 choose_walking_way.path_b_almalexia_desc: "The healer, the protector, the mother. Almalexia led the Hands of Almalexia and held Mournhold together. Her madness after losing the Heart is also part of the pattern. Unlocked by completing the Boethiah mantle (Anticipation of Almalexia). [Requires: Boethiah Mantle completed, diplomacy 16+, compassionate or zealous]"
 choose_walking_way.path_b_sotha_sil: "Path B: Mantling Sotha Sil — The Clockwork God [TRIBUNAL TIER]"
 choose_walking_way.path_b_sotha_sil_desc: "The Clockwork God built the Clockwork City and then withdrew from the world to maintain it. Mysticism, logic, artifice, and time. Philosophical detachment so complete he disappeared. Unlocked by completing the Azura mantle (Anticipation of Sotha Sil). [Requires: Azura Mantle completed, learning 18+, tonal_architect or scholar or clockwork_city_visited]"

 # ─── New Path Decision Options ───
 choose_walking_way.path_g: "Path G: Tonal Architecture — The Dwemer's Way [DANGEROUS]"
 choose_walking_way.path_g_desc: "The Dwemer used tonal manipulation of reality to rewrite the self. Kagrenac used it on the Heart of Lorkhan. The Dwemer used it on themselves and vanished. This is explicitly the wrong Walking Way — dangerous, materialist, the path of science not spirit. Those who survive are rewritten. Many do not survive. [Requires: tonal_architect trait, learning 18+]"
 choose_walking_way.path_h: "Path H: Prolix Tower — The Language of Divinity"
 choose_walking_way.path_h_desc: "Achieving divinity through language, recursive logic, and the power of naming. The 36 Lessons of Vivec ARE a Prolix Tower. The path uses writing and self-referential text to construct godhood. Lower risk than other paths — survivable even in failure. [Requires: learning 18+, vivec_blessed OR black_book_found]"
 choose_walking_way.path_i: "Path I: Worm Apotheosis — Mannimarco's Road [DANGEROUS]"
 choose_walking_way.path_i_desc: "Mannimarco's path. He became the Necromancer's Moon — a celestial body opposing Arkay's cycle. A documented lore path to divinity through soul-science and dominion over death. Failure results in lich_essence, not death. [Requires: worm_cult_adept trait, NOT lich_essence]"
